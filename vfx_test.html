let currentCombo=0;
const loader=new THREE.TextureLoader();
const texCache={};
function getTex(src){
  if(!texCache[src])texCache[src]=loader.load(src,t=>{t.minFilter=THREE.LinearFilter;t.magFilter=THREE.LinearFilter});
  return texCache[src];
}
// Preload all
COMBOS.forEach(c=>c.layers.forEach(l=>getTex(l.src)));

const listEl=document.getElementById('list');
COMBOS.forEach((c,i)=>{
  const d=document.createElement('div');
  d.textContent=(c.layers.length>1?'[COMBO] ':'')+c.name;
  if(c.layers.length>1)d.style.color='#ffcc44';
  d.onclick=()=>{currentCombo=i;updateList()};
  listEl.appendChild(d);
});
function updateList(){
  [...listEl.children].forEach((d,i)=>d.className=i===currentCombo?'active':'');
  const c=COMBOS[currentCombo];
  document.getElementById('ui').textContent=
    `Click=spawn | Scale:${spawnScale.toFixed(1)} | [${c.name}] (${c.layers.length} layers) | Drag=rotate | Space=burst`;
}
updateList();

const vfxPool=[];

function makeLayer(l,wx,wy,wz,baseScale){
  const tex=getTex(l.src);
  if(!tex)return null;
  const totalFrames=l.cols*l.rows;
  const sc=baseScale*(l.scale||1);

  // Billboard sprite
  const ct=tex.clone();ct.needsUpdate=true;
  ct.repeat.set(1/l.cols,1/l.rows);
  ct.offset.set(0,1-1/l.rows);
  const mat=new THREE.SpriteMaterial({map:ct,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(sc,sc,1);
  sprite.position.set(wx,wy,wz);
  scene.add(sprite);

  // Cross planes
  const mkPlane=()=>{
    const ct2=tex.clone();ct2.needsUpdate=true;
    ct2.repeat.set(1/l.cols,1/l.rows);
    ct2.offset.set(0,1-1/l.rows);
    const pm=new THREE.MeshBasicMaterial({map:ct2,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false,side:THREE.DoubleSide});
    const pl=new THREE.Mesh(new THREE.PlaneGeometry(sc,sc),pm);
    pl.position.set(wx,wy,wz);
    return {mesh:pl,mat:pm,tex:ct2};
  };
  const p1=mkPlane();
  p1.mesh.rotation.set(Math.random()*0.5-0.25,Math.random()*Math.PI*2,Math.random()*0.5-0.25);
  scene.add(p1.mesh);
  const p2=mkPlane();
  p2.mesh.rotation.copy(p1.mesh.rotation);
  p2.mesh.rotateY(Math.PI/2);
  scene.add(p2.mesh);

  return {
    sprite,mat,tex:ct,
    plane:p1.mesh,planeMat:p1.mat,tex2:p1.tex,
    plane2:p2.mesh,planeMat2:p2.mat,tex3:p2.tex,
    frame:0,totalFrames,
    cols:l.cols,rows:l.rows,
    timer:0,frameTime:l.speed||0.05,
    delay:l.delay||0,
    life:0,maxLife:totalFrames*(l.speed||0.05)+(l.delay||0),
    scale:sc,
    rotSpd:(Math.random()-0.5)*2,
    started:false,
  };
}

function spawnVFX(wx,wy,wz){
  const c=COMBOS[currentCombo];
  c.layers.forEach(l=>{
    const layer=makeLayer(l,wx,wy,wz,spawnScale);
    if(layer)vfxPool.push(layer);
  });
}

// Raycaster for click placement
const raycaster=new THREE.Raycaster();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);

renderer.domElement.addEventListener('click',(e)=>{
  if(isDragging)return;
  const mouse=new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const hit=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,hit);
  if(hit) spawnVFX(hit.x, 0.5+Math.random()*0.5, hit.z);
});

// Camera orbit (drag)
let isDragging=false, dragStart={x:0,y:0}, camAngle=0.4, camHeight=3, camDist=8;
function updateCam(){
  camera.position.set(Math.sin(camAngle)*camDist, camHeight, Math.cos(camAngle)*camDist);
  camera.lookAt(0,0.5,0);
}
updateCam();

renderer.domElement.addEventListener('mousedown',(e)=>{isDragging=false;dragStart={x:e.clientX,y:e.clientY}});
renderer.domElement.addEventListener('mousemove',(e)=>{
  if(e.buttons!==1)return;
  const dx=e.clientX-dragStart.x, dy=e.clientY-dragStart.y;
  if(Math.abs(dx)+Math.abs(dy)>5)isDragging=true;
  camAngle+=dx*0.01;
  camHeight=Math.max(1,Math.min(12,camHeight-dy*0.03));
  dragStart={x:e.clientX,y:e.clientY};
  updateCam();
});

window.addEventListener('wheel',(e)=>{
  if(e.shiftKey){
    camDist=Math.max(2,Math.min(20,camDist+(e.deltaY>0?0.5:-0.5)));
    updateCam();
  }else{
    spawnScale=Math.max(0.3,Math.min(6,spawnScale+(e.deltaY>0?-0.2:0.2)));
    updateList();
  }
});

window.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){currentCombo=Math.min(COMBOS.length-1,currentCombo+1);updateList()}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){currentCombo=Math.max(0,currentCombo-1);updateList()}
  // Space = burst spawn
  if(e.key===' '){
    for(let i=0;i<5;i++) spawnVFX((Math.random()-0.5)*4, 0.5+Math.random(), (Math.random()-0.5)*4);
  }
});

let lastT=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min(0.05,(now-lastT)/1000);
  lastT=now;

  for(let i=vfxPool.length-1;i>=0;i--){
    const v=vfxPool[i];
    v.life+=dt;
    // Delay handling
    if(v.delay>0){v.delay-=dt;v.mat.opacity=0;v.planeMat.opacity=0;v.planeMat2.opacity=0;continue;}
    if(!v.started){v.started=true;v.life=0;v.timer=0;}
    v.timer+=dt;

    if(v.timer>=v.frameTime){
      v.timer-=v.frameTime;
      v.frame++;
      if(v.frame>=v.totalFrames){
        scene.remove(v.sprite);scene.remove(v.plane);scene.remove(v.plane2);
        v.mat.dispose();v.planeMat.dispose();v.planeMat2.dispose();
        v.tex.dispose();v.tex2.dispose();v.tex3.dispose();
        vfxPool.splice(i,1);
        continue;
      }
      const col=v.frame%v.cols;
      const row=v.rows-1-Math.floor(v.frame/v.cols);
      v.tex.offset.set(col/v.cols,row/v.rows);
      v.tex2.offset.set(col/v.cols,row/v.rows);
      v.tex3.offset.set(col/v.cols,row/v.rows);
    }

    const p=v.life/v.maxLife;
    const alpha=Math.max(0,1-p*p);
    v.mat.opacity=alpha*0.8;
    v.planeMat.opacity=alpha;
    v.planeMat2.opacity=alpha;

    const sc=v.scale*(0.6+p*0.8);
    v.sprite.scale.set(sc,sc,1);
    v.plane.scale.set(1+p*0.3,1+p*0.3,1);
    v.plane2.scale.set(1+p*0.3,1+p*0.3,1);

    // Slight upward drift
    v.sprite.position.y+=dt*0.3;
    v.plane.position.y+=dt*0.3;
    v.plane2.position.y+=dt*0.3;

    // Rotate planes
    v.plane.rotation.y+=dt*v.rotSpd;
    v.plane2.rotation.y+=dt*v.rotSpd;
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
