<!DOCTYPE html><html><head><meta charset="utf-8"><title>Chest3D Preview</title><style>body{margin:0;background:#0a0a12;display:flex;align-items:center;justify-content:center;height:100vh;}#chest3dCvs{display:block;}</style></head><body><canvas id="chest3dCvs"></canvas><script src="three.min.js"></script><script>var G={on:true,cam:{x:0,y:0}};var _dpr=devicePixelRatio;var OPT={resScale:100};function shake(){}</script><script>(function(){
'use strict';
const CVS=document.getElementById('chest3dCvs');
if(!CVS||typeof THREE==='undefined')return;

const SZ=250;
const R=new THREE.WebGLRenderer({canvas:CVS,alpha:true,antialias:true,powerPreference:'high-performance'});
R.setSize(SZ,SZ);R.setPixelRatio(Math.min(devicePixelRatio,2));
CVS.style.width=CVS.style.height=SZ+'px';
R.setClearColor(0,0);R.outputColorSpace=THREE.SRGBColorSpace;
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.15;

const SC=new THREE.Scene();
SC.fog=new THREE.FogExp2(0x000008,0.18);

// 카메라 — 적당히 물러남, 상자 전체가 보이게
const CAM=new THREE.PerspectiveCamera(38,1,0.01,50);
CAM.position.set(0,2.1,4.2);CAM.lookAt(0,0.45,0);

// Environment map — 중성색(반사용)
const cubeRT=new THREE.WebGLCubeRenderTarget(128,{generateMipmaps:true,minFilter:THREE.LinearMipmapLinearFilter});
const cubeCam=new THREE.CubeCamera(0.1,50,cubeRT);
const envS=new THREE.Scene();
envS.add(new THREE.HemisphereLight(0xddddff,0x222200,1.2));
const eD1=new THREE.DirectionalLight(0xffffff,4.0);eD1.position.set(2,3,1);envS.add(eD1);
const eD2=new THREE.DirectionalLight(0x4466bb,2.5);eD2.position.set(-2,1,-2);envS.add(eD2);
cubeCam.update(R,envS);
SC.environment=cubeRT.texture;

// 씬 조명
const keyL=new THREE.DirectionalLight(0xffffff,1.5);
keyL.position.set(1.5,8,3);keyL.castShadow=true;
keyL.shadow.mapSize.set(1024,1024);
keyL.shadow.camera.near=0.1;keyL.shadow.camera.far=22;
keyL.shadow.camera.left=keyL.shadow.camera.bottom=-3.5;
keyL.shadow.camera.right=keyL.shadow.camera.top=3.5;
keyL.shadow.bias=-0.0005;SC.add(keyL);
const rimL=new THREE.DirectionalLight(0x2244cc,2.5);rimL.position.set(-1.5,2,-3);SC.add(rimL);
const topL=new THREE.DirectionalLight(0xfff8f0,0.3);topL.position.set(0,5,0);SC.add(topL);
SC.add(new THREE.HemisphereLight(0x0a0805,0x010208,0.4));
const iL1=new THREE.PointLight(0xff9922,0,5);iL1.position.set(0,1.0,0.3);SC.add(iL1);
const iL2=new THREE.PointLight(0xffd070,0,10);iL2.position.set(0,4,0);SC.add(iL2);
const iL3=new THREE.PointLight(0xffcc33,0,4);iL3.position.set(0,0.6,-0.2);SC.add(iL3);
const runeL=new THREE.PointLight(0x2266ff,0.5,2.2);runeL.position.set(0,0.5,1.0);SC.add(runeL);

// ===== 재질 — 어두운 목재, envMapIntensity 낮게 =====
const woodC=[0x0e0602,0x120804,0x0c0501,0x100703];
const mWood=woodC.map(c=>new THREE.MeshStandardMaterial({color:c,roughness:0.96,metalness:0.0,envMapIntensity:0.0}));
const mIron=new THREE.MeshStandardMaterial({color:0x100e0a,roughness:0.12,metalness:0.99,envMapIntensity:2.2});
const mGold=new THREE.MeshStandardMaterial({color:0xc89500,roughness:0.05,metalness:1.0,emissive:new THREE.Color(0x5a3200),emissiveIntensity:1.0,envMapIntensity:2.8});
const mGoldBright=new THREE.MeshStandardMaterial({color:0xffcc20,roughness:0.02,metalness:1.0,emissive:new THREE.Color(0x8a4800),emissiveIntensity:1.8,envMapIntensity:3.2});
const mRuneBg=new THREE.MeshStandardMaterial({color:0x010008,roughness:0.7,metalness:0.15,envMapIntensity:0.1});
const mInside=new THREE.MeshStandardMaterial({color:0x050200,roughness:1.0,metalness:0.0});
const mGlow=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});

// Vegvisir 룬 256px
const runeC=document.createElement('canvas');runeC.width=runeC.height=256;
const rc=runeC.getContext('2d');
rc.fillStyle='#000';rc.fillRect(0,0,256,256);
rc.strokeStyle='#fff';rc.lineCap='round';rc.lineJoin='round';
rc.lineWidth=4.5;rc.beginPath();rc.arc(128,128,120,0,Math.PI*2);rc.stroke();
rc.lineWidth=2;rc.beginPath();rc.arc(128,128,112,0,Math.PI*2);rc.stroke();
rc.lineWidth=3;rc.beginPath();rc.arc(128,128,68,0,Math.PI*2);rc.stroke();
rc.lineWidth=2;rc.beginPath();rc.arc(128,128,28,0,Math.PI*2);rc.stroke();
rc.lineWidth=5.5;
for(let i=0;i<8;i++){
  const a=i*Math.PI/4-Math.PI/2;
  rc.beginPath();rc.moveTo(128+Math.cos(a)*30,128+Math.sin(a)*30);
  rc.lineTo(128+Math.cos(a)*110,128+Math.sin(a)*110);rc.stroke();
  const bx=128+Math.cos(a)*82,by=128+Math.sin(a)*82;
  const px=Math.cos(a+Math.PI/2)*11,py=Math.sin(a+Math.PI/2)*11;
  rc.lineWidth=3;
  rc.beginPath();rc.moveTo(bx-px,by-py);rc.lineTo(bx+px,by+py);rc.stroke();
  if(i%2===0){rc.beginPath();rc.moveTo(bx,by);rc.lineTo(bx+Math.cos(a)*14,by+Math.sin(a)*14);rc.stroke();}
  rc.lineWidth=5.5;
}
rc.lineWidth=3.5;
for(let i=0;i<6;i++){const a=i*Math.PI/3,a2=a+Math.PI/3;rc.beginPath();rc.moveTo(128+Math.cos(a)*24,128+Math.sin(a)*24);rc.lineTo(128+Math.cos(a2)*24,128+Math.sin(a2)*24);rc.stroke();}
[[18,18],[238,18],[18,238],[238,238]].forEach(p=>{
  rc.lineWidth=3.5;rc.beginPath();rc.moveTo(p[0],p[1]-12);rc.lineTo(p[0]-9,p[1]+7);rc.lineTo(p[0]+9,p[1]+7);rc.closePath();rc.stroke();
});
const runeTex=new THREE.CanvasTexture(runeC);
// MeshBasicMaterial: 토맵핑 무관, 순수 파란 glow
const mRuneGlow=new THREE.MeshBasicMaterial({
  map:runeTex,color:new THREE.Color(0x4488ff),
  transparent:true,alphaMap:runeTex,
  blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide
});
let _runeOpacity=1.0;

// ===== 지오메트리 =====
const ROOT=new THREE.Group();SC.add(ROOT);ROOT.rotation.y=-0.22;

// 본체 판재 4개
const pH=0.25;
for(let i=0;i<4;i++){
  const m=new THREE.Mesh(new THREE.BoxGeometry(2.1,pH-0.018,1.35),mWood[i]);
  m.position.y=i*pH+pH/2;m.castShadow=true;m.receiveShadow=true;ROOT.add(m);
}

// 내부
const ins=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.8,1.1),mInside);
ins.position.set(0,0.52,0);ROOT.add(ins);
const glowMesh=new THREE.Mesh(new THREE.PlaneGeometry(1.6,1.0),mGlow);
glowMesh.position.set(0,0.97,0);glowMesh.rotation.x=-Math.PI/2;ROOT.add(glowMesh);

// LID
const LID=new THREE.Group();LID.position.set(0,1.0,-0.675);ROOT.add(LID);
const lidBase=new THREE.Mesh(new THREE.BoxGeometry(2.12,0.38,1.37),mWood[0]);
lidBase.position.set(0,0.19,0.685);lidBase.castShadow=true;LID.add(lidBase);
const archG=new THREE.CylinderGeometry(0.18,0.18,2.10,24,1,true,0,Math.PI);
const archM=new THREE.Mesh(archG,mWood[2]);
archM.rotation.z=-Math.PI/2;archM.position.set(0,0.36,0.685);archM.castShadow=true;LID.add(archM);
const lidFE=new THREE.Mesh(new THREE.BoxGeometry(2.14,0.42,0.06),mGold);lidFE.position.set(0,0.19,1.38);LID.add(lidFE);
const lidMold=new THREE.Mesh(new THREE.BoxGeometry(2.14,0.08,1.39),mGold);lidMold.position.set(0,0.39,0.685);LID.add(lidMold);
const archTop=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,2.12,12),mGoldBright);
archTop.rotation.z=Math.PI/2;archTop.position.set(0,0.53,0.685);LID.add(archTop);
[0.06,0.28].forEach(by=>{
  const b=new THREE.Mesh(new THREE.BoxGeometry(2.12,0.068,1.37),mIron);b.position.set(0,by,0.685);LID.add(b);
  const s=new THREE.Mesh(new THREE.BoxGeometry(2.14,0.022,1.39),mGold);s.position.set(0,by+0.042,0.685);LID.add(s);
});

// 본체 철 밴드 + 리벳
[0.16,0.50,0.84].forEach(by=>{
  const b=new THREE.Mesh(new THREE.BoxGeometry(2.13,0.068,1.37),mIron);b.position.set(0,by,0);ROOT.add(b);
  const s=new THREE.Mesh(new THREE.BoxGeometry(2.15,0.022,1.39),mGold);s.position.set(0,by+0.04,0);ROOT.add(s);
  [-0.95,0,0.95].forEach(bx=>[-0.62,0,0.62].forEach(bz=>{
    const rv=new THREE.Mesh(new THREE.SphereGeometry(0.048,10,8),mGold);
    rv.position.set(bx,by+0.042,bz);ROOT.add(rv);
  }));
});

// 앞면 룬 패널
const fFrm=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.72,0.048),mIron);fFrm.position.set(0,0.5,0.68);ROOT.add(fFrm);
const rBg=new THREE.Mesh(new THREE.BoxGeometry(1.12,0.60,0.038),mRuneBg);rBg.position.set(0,0.5,0.69);ROOT.add(rBg);
[[0,0.808,0.705,1.20,0.032,0.025],[0,0.192,0.705,1.20,0.032,0.025],
 [-0.576,0.5,0.705,0.032,0.64,0.025],[0.576,0.5,0.705,0.032,0.64,0.025]].forEach(d=>{
  const bx=new THREE.Mesh(new THREE.BoxGeometry(d[3],d[4],d[5]),mGoldBright);
  bx.position.set(d[0],d[1],d[2]);ROOT.add(bx);
});
[[-0.563,0.800],[0.563,0.800],[-0.563,0.200],[0.563,0.200]].forEach(p=>{
  const gj=new THREE.Mesh(new THREE.SphereGeometry(0.040,12,10),mGoldBright);
  gj.position.set(p[0],p[1],0.714);ROOT.add(gj);
});
const rGfx=new THREE.Mesh(new THREE.PlaneGeometry(0.95,0.52),mRuneGlow);
rGfx.position.set(0,0.5,0.715);ROOT.add(rGfx);

// 자물쇠
const lBk=new THREE.Mesh(new THREE.BoxGeometry(0.36,0.48,0.075),mIron);lBk.position.set(0,0.94,0.672);ROOT.add(lBk);
const lHs=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.18,0.12),mGold);lHs.position.set(0,0.88,0.692);ROOT.add(lHs);
const lArc=new THREE.Mesh(new THREE.TorusGeometry(0.088,0.030,14,30,Math.PI),mGoldBright);
lArc.position.set(0,1.00,0.692);lArc.rotation.z=Math.PI;ROOT.add(lArc);
const lKey=new THREE.Mesh(new THREE.CylinderGeometry(0.036,0.036,0.13,14),mGoldBright);
lKey.position.set(0,0.86,0.712);lKey.rotation.x=Math.PI/2;ROOT.add(lKey);

// 코너 기둥
[[-1.03,0.665],[1.03,0.665],[-1.03,-0.665],[1.03,-0.665]].forEach(co=>{
  const cl=new THREE.Mesh(new THREE.BoxGeometry(0.07,1.03,0.07),mIron);cl.position.set(co[0],0.515,co[1]);ROOT.add(cl);
  [0.14,0.50,0.86].forEach(cy=>{
    const cb=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.16,0.12),mGold);cb.position.set(co[0],cy,co[1]);ROOT.add(cb);
  });
});
[-1.12,1.12].forEach((hx,i)=>{
  const tg=new THREE.TorusGeometry(0.12,0.025,8,22,Math.PI);
  const tm=new THREE.Mesh(tg,mIron);
  tm.position.set(hx,0.58,0);tm.rotation.y=(i===0?1:-1)*Math.PI/2;ROOT.add(tm);
});

const flr=new THREE.Mesh(new THREE.PlaneGeometry(8,8),new THREE.MeshStandardMaterial({color:0,transparent:true,opacity:0,roughness:1}));
flr.rotation.x=-Math.PI/2;flr.position.y=-0.005;flr.receiveShadow=true;SC.add(flr);

// 파티클
const parts=[];
for(let i=0;i<24;i++){
  const pm=new THREE.MeshBasicMaterial({
    color:new THREE.Color().setHSL(0.60+Math.random()*0.10,1.0,0.65+Math.random()*0.2),
    transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide
  });
  const p=new THREE.Mesh(new THREE.PlaneGeometry(1,1),pm);
  const sz=0.05+Math.random()*0.08;p.scale.setScalar(sz);
  p.userData={angle:Math.random()*Math.PI*2,r:0.65+Math.random()*1.0,
    yOff:Math.random()*1.2,ySpd:0.12+Math.random()*0.22,
    aSpd:(0.22+Math.random()*0.30)*(Math.random()<0.5?1:-1),phase:Math.random()*Math.PI*2};
  p.visible=false;SC.add(p);parts.push(p);
}

// 상태 기계
let _st='hidden',_timer=0,_lidAng=0,_wx=0,_wy=0;
function _reset(){
  LID.rotation.x=0;ROOT.position.set(0,0,0);ROOT.rotation.set(0,0,0);
  mRuneGlow.opacity=1.0;_runeOpacity=1.0;mGoldBright.emissiveIntensity=1.8;mGold.emissiveIntensity=1.0;
  mGlow.opacity=0;iL1.intensity=0;iL2.intensity=0;iL3.intensity=0;
  parts.forEach(p=>{p.visible=false;p.material.opacity=0;});
}
window._chest3d={
  show(wx,wy){_wx=wx;_wy=wy;_st='idle';_timer=0;_lidAng=0;_reset();CVS.style.display='block';},
  open(){if(_st==='idle'||_st==='rattling'){_st='rattling';_timer=0;}},
  hide(){_st='hidden';CVS.style.display='none';},
  get active(){return _st!=='hidden';}
};

function updatePos(){
  const c=document.getElementById('c');
  if(!c||typeof G==='undefined'||!G.on)return;
  const sc=(typeof _dpr!=='undefined'?_dpr:devicePixelRatio)*((typeof OPT!=='undefined'&&OPT.resScale)?OPT.resScale/100:1);
  const cssX=(c.width/2+(_wx-G.cam.x))/sc;
  const cssY=(c.height/2+(_wy-G.cam.y))/sc;
  if(cssX<-500||cssX>innerWidth+500||cssY<-550||cssY>innerHeight+500){CVS.style.opacity='0';return;}
  CVS.style.opacity='1';
  CVS.style.left=(cssX-SZ/2)+'px';
  CVS.style.top=(cssY-SZ*.82)+'px';
}

const CLK=new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  if(_st==='hidden')return;
  const dt=Math.min(CLK.getDelta(),0.05);_timer+=dt;
  updatePos();
  parts.forEach((p,i)=>{
    const u=p.userData;
    if(_st==='idle'||_st==='rattling'){
      p.visible=true;u.angle+=dt*u.aSpd;
      const y0=0.05+((u.yOff+_timer*u.ySpd)%1.3);
      p.position.set(Math.cos(u.angle)*u.r,y0,Math.sin(u.angle)*u.r*0.4-0.05);
      p.lookAt(CAM.position);
      p.material.opacity=(_st==='rattling'?0.85:0.45)+Math.sin(_timer*1.8+u.phase)*0.18;
    }else if(_st==='opening'&&_timer<0.6){
      p.visible=true;p.material.opacity=Math.max(0,(0.6-_timer)*1.6);
    }else{p.visible=false;}
  });

  if(_st==='idle'){
    ROOT.position.y=Math.sin(_timer*1.4)*0.028;
    ROOT.rotation.y=-0.22+Math.sin(_timer*0.5)*0.04;
    _runeOpacity=0.85+Math.sin(_timer*2.6)*0.15;mRuneGlow.opacity=_runeOpacity;
    mGoldBright.emissiveIntensity=1.8+Math.sin(_timer*1.9)*0.7;
    mGold.emissiveIntensity=1.0+Math.sin(_timer*1.5)*0.3;
    runeL.intensity=0.5+Math.sin(_timer*2.6)*0.28;
  }else if(_st==='rattling'){
    const rp=Math.min(1,_timer*2.2);
    ROOT.position.x=Math.sin(_timer*46)*0.045*rp;
    ROOT.position.y=Math.abs(Math.sin(_timer*42))*0.028*rp;
    ROOT.rotation.z=Math.sin(_timer*44)*0.026*rp;ROOT.rotation.y=0;
    const lk=Math.min(1,_timer*1.8);
    iL1.intensity=lk*2.0;iL3.intensity=lk*1.0;
    mGoldBright.emissiveIntensity=1.8+lk*5.5;mGold.emissiveIntensity=1.0+lk*3.5;
    mGlow.opacity=lk*0.32;mRuneGlow.opacity=0.85+lk*0.15;
    runeL.intensity=0.5+lk*2.0;
    if(_timer>.6){_st='opening';_timer=0;if(typeof shake==='function')shake(16);}
  }else if(_st==='opening'){
    const t=Math.min(1,_timer/1.2),ease=1-(1-t)*(1-t)*(1-t);
    _lidAng=-Math.PI*.85*ease;LID.rotation.x=_lidAng;
    ROOT.position.x=0;ROOT.rotation.z=0;ROOT.rotation.y=0;
    const bst=Math.min(1,_timer/.4),fad=_timer>.55?1-Math.min(1,(_timer-.55)/.95):1;
    iL1.intensity=bst*fad*18;iL2.intensity=bst*fad*9;iL3.intensity=bst*fad*7;
    mGlow.opacity=bst*fad*1.3;
    mRuneGlow.opacity=0.9;
    mGoldBright.emissiveIntensity=1.8+bst*8.0*fad;
    mGold.emissiveIntensity=1.0+bst*7.0*fad;
    runeL.intensity=0.5+bst*3.0*fad;
    if(_timer>=1.55){_st='open';_timer=0;LID.rotation.x=-Math.PI*.85;}
  }else if(_st==='open'){
    ROOT.position.y=Math.sin(_timer*1.0)*0.015;ROOT.rotation.y=-0.22;
    iL1.intensity=Math.max(0,6.0-_timer*2.0);
    iL2.intensity=Math.max(0,3.0-_timer*1.3);
    iL3.intensity=Math.max(0,3.5-_timer*1.6);
    mGlow.opacity=Math.max(0,.65-_timer*.28);
    mRuneGlow.opacity=0.85+Math.sin(_timer*2.2)*0.15;
    mGoldBright.emissiveIntensity=1.8+Math.sin(_timer*1.6)*0.6;
    mGold.emissiveIntensity=1.0+Math.sin(_timer*1.3)*0.3;
    runeL.intensity=Math.max(0,0.5-_timer*0.12);
    if(_timer>5.5){_st='hidden';CVS.style.display='none';}
  }
  R.render(SC,CAM);
}
tick();
console.log('[CHEST3D] GOW v4 dark-wood+particles');
})();
window.addEventListener("load",function(){setTimeout(function(){if(window._chest3d)window._chest3d.show(0,0);},100);});
</script></body></html>
