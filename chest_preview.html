<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chest 3D - Meshy GLB Preview</title>
<style>
body{margin:0;background:#0a0806;overflow:hidden;}
canvas{display:block;}
#info{position:fixed;bottom:10px;left:10px;color:#888;font:13px monospace;z-index:10;}
button{padding:6px 14px;background:#1a0c06;color:#ccc;border:1px solid #4a2010;border-radius:4px;cursor:pointer;margin:3px;}
</style></head><body>
<div id="info">
  <button onclick="resetCam()">Reset Camera</button>
  <button onclick="toggleRotate()">Auto Rotate</button>
  <span id="stat"></span>
</div>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
const W=window.innerWidth, H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.5;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0806);
scene.fog=new THREE.FogExp2(0x0a0806,0.08);

const cam=new THREE.PerspectiveCamera(45,W/H,0.01,100);
cam.position.set(2,2,3);cam.lookAt(0,0.5,0);

// 조명 - 고퀄리티 3점 조명
const keyLight=new THREE.DirectionalLight(0xffe0c0,3.0);
keyLight.position.set(3,5,4);keyLight.castShadow=true;
keyLight.shadow.mapSize.set(1024,1024);
keyLight.shadow.camera.near=0.1;keyLight.shadow.camera.far=20;
keyLight.shadow.camera.left=keyLight.shadow.camera.bottom=-3;
keyLight.shadow.camera.right=keyLight.shadow.camera.top=3;
keyLight.shadow.bias=-0.0005;scene.add(keyLight);

const fillLight=new THREE.DirectionalLight(0x8090b0,1.2);
fillLight.position.set(-3,2,-2);scene.add(fillLight);

const rimLight=new THREE.DirectionalLight(0xff6020,2.0);
rimLight.position.set(1,1,-4);scene.add(rimLight);

scene.add(new THREE.HemisphereLight(0x1a1008,0x060202,0.8));

// 환경맵
const cubeRT=new THREE.WebGLCubeRenderTarget(128,{generateMipmaps:true,minFilter:THREE.LinearMipmapLinearFilter});
const cubeCam=new THREE.CubeCamera(0.1,50,cubeRT);
const envScene=new THREE.Scene();
envScene.add(new THREE.HemisphereLight(0x4a3020,0x101018,3.0));
const ed1=new THREE.DirectionalLight(0xffffff,5);ed1.position.set(2,4,2);envScene.add(ed1);
const ed2=new THREE.DirectionalLight(0x3344aa,2);ed2.position.set(-3,-1,-3);envScene.add(ed2);
cubeCam.update(renderer,envScene);
scene.environment=cubeRT.texture;

// 바닥
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x0c0a08,roughness:0.95,metalness:0})
);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

// GLB 로드
let model=null;
const loader=new THREE.GLTFLoader();
loader.load('assets/3d/dark_gothic_medieval_treasure_chest__iro_019e0a38.glb', function(gltf){
  model=gltf.scene;
  model.traverse(function(child){
    if(child.isMesh){child.castShadow=true;child.receiveShadow=true;}
  });
  var box=new THREE.Box3().setFromObject(model);
  var size=box.getSize(new THREE.Vector3());
  var center=box.getCenter(new THREE.Vector3());
  var maxDim=Math.max(size.x,size.y,size.z);
  var scale=2.0/maxDim;
  model.scale.setScalar(scale);
  model.position.sub(center.multiplyScalar(scale));
  model.position.y+=size.y*scale*0.5;
  scene.add(model);
  document.getElementById('stat').textContent=' | Loaded';
}, function(xhr){
  if(xhr.total) document.getElementById('stat').textContent=' | Loading '+Math.round(xhr.loaded/xhr.total*100)+'%';
}, function(err){
  document.getElementById('stat').textContent=' | Error: '+err.message;
});

// 마우스 궤도 컨트롤
var isDrag=false,prevX=0,prevY=0,camTheta=0.7,camPhi=0.45,camDist=3.5;
renderer.domElement.addEventListener('mousedown',function(e){isDrag=true;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('mouseup',function(){isDrag=false;});
window.addEventListener('mousemove',function(e){
  if(!isDrag)return;
  camTheta-=(e.clientX-prevX)*0.008;
  camPhi=Math.max(0.1,Math.min(1.4,camPhi-(e.clientY-prevY)*0.008));
  prevX=e.clientX;prevY=e.clientY;
});
renderer.domElement.addEventListener('wheel',function(e){
  camDist=Math.max(1.5,Math.min(8,camDist+e.deltaY*0.003));
});

var autoRot=true;
function toggleRotate(){autoRot=!autoRot;}
function resetCam(){camTheta=0.7;camPhi=0.45;camDist=3.5;}

var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var dt=clock.getDelta();
  if(autoRot) camTheta+=dt*0.3;
  cam.position.x=Math.sin(camTheta)*Math.cos(camPhi)*camDist;
  cam.position.y=Math.sin(camPhi)*camDist+0.3;
  cam.position.z=Math.cos(camTheta)*Math.cos(camPhi)*camDist;
  cam.lookAt(0,0.5,0);
  renderer.render(scene,cam);
}
animate();

window.addEventListener('resize',function(){
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script></body></html>
