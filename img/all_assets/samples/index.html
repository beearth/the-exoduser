<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>스프라이트 샘플 뷰어</title>
<style>
body{background:#1a1a2e;color:#eee;font-family:'Segoe UI',monospace;padding:30px 40px}
h1{color:#8f8;text-align:center;margin-bottom:30px}
h2{color:#ffcc55;border-bottom:1px solid #444;padding-bottom:8px;margin-top:40px}
.row{display:flex;gap:16px;align-items:flex-end;background:#252540;padding:20px 24px;border-radius:10px;border:1px solid #444;flex-wrap:wrap}
.card{text-align:center}
.card img{image-rendering:pixelated;border:1px solid #555;background:#111;display:block;margin:0 auto}
.card p{margin:6px 0 0;font-size:12px;color:#aaf}
.sz{font-size:11px;color:#888}
</style></head><body>
<h1>스프라이트 샘플 뷰어</h1>

<h2>소형 구울 (etype 100) <span class="sz">32×32</span></h2>
<div class="row">
<div class="card"><img src="small_ghoul/rotations/south.png" style="width:128px;height:128px"><p>South</p></div>
<div class="card"><img src="small_ghoul/rotations/east.png" style="width:128px;height:128px"><p>East</p></div>
<div class="card"><img src="small_ghoul/rotations/north.png" style="width:128px;height:128px"><p>North</p></div>
<div class="card"><img src="small_ghoul/rotations/west.png" style="width:128px;height:128px"><p>West</p></div>
</div>

<h2>구울 중형 (etype 101) <span class="sz">48×48</span></h2>
<div class="row">
<div class="card"><img src="medium_ghoul/rotations/south.png" style="width:144px;height:144px"><p>South</p></div>
<div class="card"><img src="medium_ghoul/rotations/east.png" style="width:144px;height:144px"><p>East</p></div>
<div class="card"><img src="medium_ghoul/rotations/north.png" style="width:144px;height:144px"><p>North</p></div>
<div class="card"><img src="medium_ghoul/rotations/west.png" style="width:144px;height:144px"><p>West</p></div>
</div>

<h2>대형 구울 (etype 102) <span class="sz">64×64</span></h2>
<div class="row">
<div class="card"><img src="large_ghoul/rotations/south.png" style="width:192px;height:192px"><p>South</p></div>
<div class="card"><img src="large_ghoul/rotations/east.png" style="width:192px;height:192px"><p>East</p></div>
<div class="card"><img src="large_ghoul/rotations/north.png" style="width:192px;height:192px"><p>North</p></div>
<div class="card"><img src="large_ghoul/rotations/west.png" style="width:192px;height:192px"><p>West</p></div>
</div>

</body></html>
