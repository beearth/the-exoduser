</head><body>
<div id="info">Click = spawn | ←→ = cycle | Space = burst 5</div>

<script src="three.min.js"></script>

const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(W,H);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.setClearColor(0x0a0a0a);
document.body.appendChild(r.domElement);

// 그리드

  new THREE.PlaneGeometry(20,20,20,20),
  new THREE.MeshBasicMaterial({color:0x222222,wireframe:true,transparent:true,opacity:0.2})

grid.rotation.x=-Math.PI/2;scene.add(grid);

const tc={};
function tex(src){if(!tc[src])tc[src]=tl.load(src,t=>{t.minFilter=THREE.LinearFilter;t.magFilter=THREE.LinearFilter});return tc[src]}

const parts=[];

function addPart(opt){
  const t=tex(opt.tex);
  const ct=t.clone();ct.needsUpdate=true;
  if(opt.sheet){ct.repeat.set(1/opt.sheet.c,1/opt.sheet.r);ct.offset.set(0,1-1/opt.sheet.r)}
  const mat=new THREE.SpriteMaterial({
    map:ct,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false,
    color:new THREE.Color(opt.col||'#ffffff')
  });
  const sp=new THREE.Sprite(mat);
  const sc=opt.sc||0.5;
  sp.scale.set(sc,sc,1);
  sp.position.set(opt.x||0,opt.y||0,opt.z||0);
  scene.add(sp);
  parts.push({
    sp,mat,tex:ct,
    vx:(opt.vx||0),vy:(opt.vy||0),vz:(opt.vz||0),
    life:0,maxLife:opt.life||0.5,
    sc0:sc,scEnd:opt.scEnd||sc*1.5,scCurve:opt.scCurve||null,
    alpha0:opt.alpha||1,alphaEnd:opt.alphaEnd||0,
    rot:opt.rot||0,rotSpd:opt.rotSpd||(Math.random()-.5)*4,
    gravity:opt.gravity||0,
    colGrad:opt.colGrad||null, // [{t,r,g,b},...] color over lifetime
    sheet:opt.sheet||null,sheetFrame:0,sheetTimer:0,sheetSpd:opt.sheetSpd||0.04
  });
}
// Color over Lifetime 보간
function lerpGrad(grad,t){
  if(!grad||grad.length<2)return null;
  for(let i=0;i<grad.length-1;i++){
    if(t>=grad[i].t&&t<=grad[i+1].t){
      const p=(t-grad[i].t)/(grad[i+1].t-grad[i].t);
      return{r:grad[i].r+(grad[i+1].r-grad[i].r)*p,g:grad[i].g+(grad[i+1].g-grad[i].g)*p,b:grad[i].b+(grad[i+1].b-grad[i].b)*p};
    }
  }
  const l=grad[grad.length-1];return{r:l.r,g:l.g,b:l.b};
}
// Size curve 보간 (0→0.47, 1→1.0 = Unity 기본)
function sizeEase(t){return 0.47+(1-0.47)*t} // 0.47→1.0

const presetKeys=Object.keys(PRESETS);
let curIdx=0;

// 리스트 UI
const listEl=document.getElementById('list');
presetKeys.forEach((k,i)=>{
  const d=document.createElement('div');
  d.textContent=PRESETS[k].name;
  d.style.color=PRESETS[k].col;
  d.onclick=()=>{curIdx=i;updateList()};
  listEl.appendChild(d);
});
function updateList(){
  [...listEl.children].forEach((d,i)=>d.className=i===curIdx?'active':'');
  document.getElementById('info').textContent=
    `Click=spawn | [${PRESETS[presetKeys[curIdx]].name}] | ←→=cycle | Space=burst`;
}
updateList();

// 클릭 스폰
const raycaster=new THREE.Raycaster();
const gp=new THREE.Plane(new THREE.Vector3(0,1,0),0);
r.domElement.addEventListener('click',e=>{
  const m=new THREE.Vector2((e.clientX/W)*2-1,-(e.clientY/H)*2+1);
  raycaster.setFromCamera(m,cam);
  const hit=new THREE.Vector3();
  raycaster.ray.intersectPlane(gp,hit);
  if(hit)PRESETS[presetKeys[curIdx]].spawn(hit.x,Math.max(0.3,hit.y+0.5),hit.z);
});

// 키보드
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){curIdx=(curIdx+1)%presetKeys.length;updateList()}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){curIdx=(curIdx-1+presetKeys.length)%presetKeys.length;updateList()}
  if(e.key===' '){for(let i=0;i<5;i++)PRESETS[presetKeys[curIdx]].spawn((Math.random()-.5)*4,0.5+Math.random()*.5,(Math.random()-.5)*3)}
});

// 카메라 드래그
let camAng=0.3,camH=2,camDist=6;
function updateCam(){cam.position.set(Math.sin(camAng)*camDist,camH,Math.cos(camAng)*camDist);cam.lookAt(0,.5,0)}
updateCam();
let dragging=false,dragS={x:0,y:0};
r.domElement.addEventListener('mousedown',e=>{dragging=false;dragS={x:e.clientX,y:e.clientY}});
r.domElement.addEventListener('mousemove',e=>{if(e.buttons!==1)return;if(Math.abs(e.clientX-dragS.x)+Math.abs(e.clientY-dragS.y)>5)dragging=true;
  camAng+=((e.clientX-dragS.x)*.01);camH=Math.max(.5,Math.min(8,camH-(e.clientY-dragS.y)*.03));dragS={x:e.clientX,y:e.clientY};updateCam()});
window.addEventListener('wheel',e=>{camDist=Math.max(2,Math.min(15,camDist+(e.deltaY>0?.4:-.4)));updateCam()});

// 애니메이트
let lastT=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min(0.05,(now-lastT)/1000);
  lastT=now;

  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.life+=dt;
    const t=Math.min(1,p.life/p.maxLife);
    if(t>=1){scene.remove(p.sp);p.mat.dispose();parts.splice(i,1);continue}

    // 이동
    p.sp.position.x+=p.vx*dt;
    p.sp.position.y+=p.vy*dt;
    p.sp.position.z+=p.vz*dt;
    p.vy+=p.gravity*dt;
    // 감속
    p.vx*=(1-dt*2);p.vz*=(1-dt*2);

    // 스케일 (scCurve: Unity 0.47→1.0 이징)
    const scT=p.scCurve?sizeEase(t):t;
    const sc=p.sc0+(p.scEnd-p.sc0)*scT;
    p.sp.scale.set(sc,sc,1);

    // 알파
    p.mat.opacity=p.alpha0+(p.alphaEnd-p.alpha0)*(t*t);

    // Color over Lifetime
    if(p.colGrad){const c=lerpGrad(p.colGrad,t);if(c)p.mat.color.setRGB(c.r,c.g,c.b)}

    // 회전
    p.sp.material.rotation+=p.rotSpd*dt;

    // 스프라이트시트 애니
    if(p.sheet){
      p.sheetTimer+=dt;
      if(p.sheetTimer>=p.sheetSpd){
        p.sheetTimer=0;p.sheetFrame++;
        const total=p.sheet.c*p.sheet.r;
        if(p.sheetFrame>=total)p.sheetFrame=total-1;
        const col=p.sheetFrame%p.sheet.c;
        const row=p.sheet.r-1-Math.floor(p.sheetFrame/p.sheet.c);
        p.tex.offset.set(col/p.sheet.c,row/p.sheet.r);
      }
    }
  }
  r.render(scene,cam);
}
animate();

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  r.setSize(innerWidth,innerHeight);
});
console.log('[VFX3D-PARTICLE] Ready — 10 presets, '+Object.values(T).reduce((a,b)=>a+b.length,0)+' textures');
