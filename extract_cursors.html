    c.beginPath();c.moveTo(cx,cy-s*.36);c.lineTo(cx,cy-5);c.stroke();
    c.beginPath();c.moveTo(cx,cy+5);c.lineTo(cx,cy+s*.36);c.stroke();
    c.beginPath();c.moveTo(cx-s*.36,cy);c.lineTo(cx-5,cy);c.stroke();
    c.beginPath();c.moveTo(cx+5,cy);c.lineTo(cx+s*.36,cy);c.stroke();
    c.strokeStyle='rgba(255,80,80,.3)';c.lineWidth=1;
    const _da=Math.PI/4;
    for(let i=0;i<4;i++){const a=_da+i*Math.PI/2;

      c.lineTo(cx+Math.cos(a)*s*.3,cy+Math.sin(a)*s*.3);c.stroke();}
    c.fillStyle='#ff4444';c.beginPath();c.arc(cx,cy,2,0,Math.PI*2);c.fill();
    c.fillStyle='#ffaaaa';c.beginPath();c.arc(cx,cy,1,0,Math.PI*2);c.fill();
    c.restore();
  }}

const out=document.getElementById('out');
const s=56;
_CURSORS.forEach(cur=>{
  const cv=document.createElement('canvas');cv.width=s;cv.height=s;
  const x=cv.getContext('2d');
  const isHand=(cur.name!=='hell_sword'&&cur.name!=='crosshair');
  if(isHand){x.save();x.translate(0,8);cur.draw(x,s-8);x.restore()}
  else{cur.draw(x,s)}
  // 4x upscale for quality
  const cv2=document.createElement('canvas');cv2.width=s*4;cv2.height=s*4;
  const x2=cv2.getContext('2d');x2.imageSmoothingEnabled=false;
  x2.drawImage(cv,0,0,s*4,s*4);
  const div=document.createElement('div');
  div.style.cssText='text-align:center';
  const img=document.createElement('img');
  img.src=cv2.toDataURL('image/png');
  img.style.cssText='width:112px;height:112px;image-rendering:pixelated;border:1px solid #444;background:#000';
  img.title=cur.label+' ('+cur.name+'.png)';
  const label=document.createElement('div');
  label.textContent=cur.label+' → '+cur.name+'.png';
  label.style.cssText='margin-top:4px;font-size:12px;color:#aaa';
  // download link
  const a=document.createElement('a');
  a.href=cv.toDataURL('image/png');
  a.download='cursor_'+cur.name+'.png';
  a.textContent='다운로드 (56px)';
  a.style.cssText='display:block;margin-top:4px;color:#6af;font-size:12px';
  div.appendChild(img);div.appendChild(label);div.appendChild(a);
  out.appendChild(div);
});
