<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>타일 텍스처 에디터</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ccc;font:12px monospace;display:flex;height:100vh;overflow:hidden;user-select:none}
#mapnav{width:170px;background:#0d0d0d;border-right:1px solid #222;display:flex;flex-direction:column;flex-shrink:0}
#mapnav h2{padding:6px;background:#1a1a1a;color:#ffea00;font-size:12px;text-align:center;border-bottom:1px solid #333}
#ch-tabs{display:flex;flex-wrap:wrap;padding:2px;gap:2px}
.ch-tab{flex:1;min-width:36px;padding:3px 1px;text-align:center;cursor:pointer;border:1px solid #333;background:#1a1a1a;color:#888;font-size:9px;border-radius:3px}
.ch-tab:hover{background:#222}.ch-tab.active{color:#000;font-weight:bold}
#stage-list{flex:1;overflow-y:auto;padding:3px}
.st-item{padding:5px 6px;cursor:pointer;border:1px solid transparent;border-radius:3px;margin:1px 0;display:flex;justify-content:space-between;align-items:center;font-size:10px}
.st-item:hover{background:#1a1a1a;border-color:#333}
.st-item.active{background:#222;border-color:#ffea00}
.st-item .sz{font-size:8px;color:#666}
.st-item .dot{width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0}
#map-footer{padding:5px;border-top:1px solid #333;font-size:9px}
#map-footer button{width:100%;padding:3px;margin:1px 0;background:#222;color:#ccc;border:1px solid #444;cursor:pointer;font:9px monospace;border-radius:2px}
#map-footer button:hover{background:#333}
#palette{width:220px;background:#111;border-right:1px solid #333;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#palette h2{padding:8px;background:#1a1a1a;color:#ffea00;font-size:13px;text-align:center;border-bottom:1px solid #333}
.cat-label{padding:4px 8px;color:#888;font-size:10px;background:#0d0d0d;border-bottom:1px solid #222}
.tile-item{display:inline-block;width:96px;height:96px;margin:4px;border:2px solid #333;cursor:pointer;position:relative;border-radius:4px;overflow:hidden;vertical-align:top}
.tile-item:hover{border-color:#888}
.tile-item.active{border-color:#ffea00;box-shadow:0 0 8px #ffea0066}
.tile-item img{width:100%;height:100%;object-fit:cover}
.tile-item .label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);color:#aaa;font-size:8px;text-align:center;padding:2px}
#workspace{flex:1;position:relative;overflow:hidden}
#workspace canvas{display:block;cursor:crosshair}
#toolbar{position:absolute;top:6px;left:6px;display:flex;gap:4px;z-index:10}
#toolbar button{padding:5px 10px;background:#222;color:#ccc;border:1px solid #444;cursor:pointer;font:11px monospace;border-radius:3px}
#toolbar button:hover{background:#333;border-color:#888}
#toolbar button.active{border-color:#ffea00;color:#ffea00}
#hud{position:absolute;bottom:6px;left:6px;color:#888;font-size:11px;z-index:10}
#hud b{color:#ffea00}
#sidebar{width:200px;background:#111;border-left:1px solid #333;display:flex;flex-direction:column;flex-shrink:0;padding:8px}
.sec{margin-bottom:12px}
.sec h4{color:#888;font-size:11px;margin-bottom:6px}
.sec label{display:block;color:#aaa;font-size:10px;margin:3px 0}
.sec input[type=range]{width:100%}
.sec input[type=number]{width:60px;background:#222;color:#ccc;border:1px solid #444;padding:2px 4px;font:11px monospace}
.sec select{width:100%;background:#222;color:#ccc;border:1px solid #444;padding:3px;font:11px monospace}
.sec button{width:100%;padding:5px;margin:2px 0;background:#222;color:#ccc;border:1px solid #444;cursor:pointer;font:10px monospace;border-radius:3px}
.sec button:hover{background:#333}
.layer-row{display:flex;align-items:center;gap:4px;padding:2px 0;font-size:10px}
.layer-row .vis{cursor:pointer;width:16px;text-align:center}
</style>
</head><body>
<div id="mapnav">
  <h2>맵 리스트</h2>
  <div id="ch-tabs"></div>
  <div id="stage-list"></div>
  <div id="map-footer">
    <button onclick="saveCurrentMap()" style="background:#1a2a00;color:#aaff66;border-color:#aaff66">💾 현재맵 저장</button>
    <button onclick="saveAllMaps()" style="background:#002a1a;color:#66ffaa;border-color:#66ffaa">💾 전체저장</button>
    <button onclick="loadAllMaps()" style="background:#001f2a;color:#66ddff;border-color:#66ddff">📂 불러오기</button>
    <button onclick="exportCurrentPNG()" style="background:#1a0030;color:#cc88ff;border-color:#cc88ff">📤 PNG내보내기</button>
    <div id="map-stats" style="margin-top:3px;color:#555">-</div>
  </div>
</div>
<div id="palette">
  <h2>타일 팔레트</h2>
  <div id="tile-list"></div>
</div>
<div id="workspace">
  <canvas id="c"></canvas>
  <div id="toolbar">
    <button onclick="setTool('stamp')" id="t-stamp" class="active">스탬프</button>
    <button onclick="setTool('erase')" id="t-erase">지우개</button>
    <button onclick="setTool('collision')" id="t-collision" style="color:#ff4444">🧱충돌</button>
    <button onclick="setTool('col-erase')" id="t-col-erase" style="color:#ff8844">🧱충돌지우기</button>
    <button onclick="setTool('asset')" id="t-asset" style="color:#ffaa44">🖼️에셋</button>
    <button onclick="setTool('pan')" id="t-pan">이동</button>
    <button onclick="undo()">↩되돌리기</button>
    <button onclick="clearAll()">전체삭제</button>
    <button onclick="toggleMapGuide()" id="t-guide">🗺️맵가이드</button>
  </div>
  <div id="hud"></div>
</div>
<div id="sidebar">
  <div class="sec">
    <h4>캔버스 설정</h4>
    <label>가로 (타일) <input type="number" id="cw" value="40" min="5" max="200"></label>
    <label>세로 (타일) <input type="number" id="ch" value="40" min="5" max="200"></label>
    <button onclick="resizeCanvas()">캔버스 리사이즈</button>
  </div>
  <div class="sec">
    <h4>스탬프 크기</h4>
    <label>크기: <span id="sz-val">5</span>타일</label>
    <input type="range" id="stamp-sz" min="8" max="80" value="40" step="8" oninput="stampSz=+this.value;document.getElementById('sz-val').textContent=(this.value/8)">
    <label style="color:#555;font-size:9px">1타일=8px, 5타일=40px, 10타일=80px</label>
  </div>
  <div class="sec">
    <h4>회전 / 반전</h4>
    <div style="display:flex;gap:3px;flex-wrap:wrap">
      <button onclick="setRot(0)" id="r0" class="active" style="flex:1;min-width:40px">0°</button>
      <button onclick="setRot(90)" id="r90" style="flex:1;min-width:40px">90°</button>
      <button onclick="setRot(180)" id="r180" style="flex:1;min-width:40px">180°</button>
      <button onclick="setRot(270)" id="r270" style="flex:1;min-width:40px">270°</button>
    </div>
    <div style="display:flex;gap:3px;margin-top:4px">
      <button onclick="toggleFlipH()" id="fh" style="flex:1">↔ 좌우반전</button>
      <button onclick="toggleFlipV()" id="fv" style="flex:1">↕ 상하반전</button>
    </div>
    <label style="color:#555;font-size:9px;margin-top:4px">R=회전(90°씩), F=좌우반전, V=상하반전</label>
  </div>
  <div class="sec">
    <h4>블렌딩</h4>
    <label>불투명도: <span id="op-val">100</span>%</label>
    <input type="range" id="opacity" min="10" max="100" value="100" step="5" oninput="stampAlpha=this.value/100;document.getElementById('op-val').textContent=this.value">
  </div>
  <div class="sec">
    <h4>레이어</h4>
    <div id="layer-list"></div>
    <button onclick="addLayer()">+ 레이어 추가</button>
    <button onclick="mergeDown()">레이어 병합</button>
  </div>
  <div class="sec">
    <h4>🧱 충돌맵</h4>
    <label><input type="checkbox" checked onchange="showCollision=this.checked;render()" style="accent-color:#ff4444"> 충돌 표시</label>
    <label style="margin-top:4px">선 굵기: <span id="col-w-val">2</span></label>
    <input type="range" id="col-width" min="1" max="8" value="2" step="1" oninput="colLineWidth=+this.value;document.getElementById('col-w-val').textContent=this.value">
    <label style="color:#555;font-size:9px;margin-top:2px">C=충돌그리기, X=충돌지우기</label>
    <button onclick="clearCollision()" style="color:#ff4444;border-color:#ff4444">충돌맵 전체삭제</button>
  </div>
  <div class="sec">
    <h4>🖼️ 임시 에셋</h4>
    <button onclick="document.getElementById('customAssetIn').click()" style="background:#2a1a00;color:#ffaa44;border-color:#ffaa44">+ 이미지 불러오기</button>
    <label style="margin-top:4px">에셋 크기: <span id="ca-sz-val">40</span>px</label>
    <input type="range" id="ca-sz" min="8" max="200" value="40" step="4" oninput="_caSz=+this.value;document.getElementById('ca-sz-val').textContent=this.value">
    <label style="margin-top:2px">회전: <span id="ca-rot-val">0</span>°</label>
    <input type="range" id="ca-rot" min="0" max="359" value="0" step="1" oninput="_caRot=+this.value;document.getElementById('ca-rot-val').textContent=this.value">
    <label><input type="checkbox" id="ca-flip" style="width:12px;height:12px" onchange="_caFlip=this.checked"> 좌우반전</label>
    <label style="margin-top:2px">불투명도: <span id="ca-alpha-val">100</span>%</label>
    <input type="range" id="ca-alpha" min="10" max="100" value="100" step="5" oninput="_caAlpha=this.value/100;document.getElementById('ca-alpha-val').textContent=this.value">
    <div id="ca-list" style="margin-top:4px;max-height:160px;overflow-y:auto"></div>
    <button onclick="_caAssets=[];_caSelIdx=-1;_buildCAList()" style="color:#ff4444;border-color:#ff4444;margin-top:2px">전체삭제</button>
    <label style="color:#555;font-size:9px;margin-top:2px">I=에셋모드 전환. 클릭으로 캔버스에 배치</label>
  </div>
  <div class="sec">
    <h4>내보내기</h4>
    <button onclick="exportPNG()" style="background:#1a2a00;color:#aaff66;border-color:#aaff66">PNG 내보내기</button>
    <button onclick="exportJSON()" style="background:#1a0030;color:#cc88ff;border-color:#cc88ff">JSON 저장</button>
    <button onclick="importJSON()" style="background:#001f2a;color:#66ddff;border-color:#66ddff">JSON 불러오기</button>
  </div>
  <div class="sec">
    <h4>배경 이미지</h4>
    <button onclick="document.getElementById('bgImgIn').click()" style="background:#2a1a00;color:#ffaa44;border-color:#ffaa44">🖼️ 이미지 불러오기</button>
    <label style="margin-top:4px">배치 모드:</label>
    <select id="bg-mode">
      <option value="stretch">늘려서 채우기</option>
      <option value="fit">맞춤 (비율유지+커버)</option>
      <option value="tile">타일링 (반복)</option>
    </select>
    <label style="margin-top:4px">스케일: <span id="bg-scale-val">100</span>%</label>
    <input type="range" id="bg-scale" min="10" max="400" value="100" step="10" oninput="document.getElementById('bg-scale-val').textContent=this.value">
    <button onclick="if(_bgLoadedImg)applyBgImage(_bgLoadedImg)" style="margin-top:4px">🔄 재적용</button>
    <label style="color:#555;font-size:9px;margin-top:2px">이미지 불러온 뒤 모드/스케일 변경하면 자동 재적용</label>
  </div>
  <div class="sec">
    <h4>🎲 절차적 생성</h4>
    <label>노이즈 스케일: <span id="ns-val">8</span></label>
    <input type="range" id="noise-scale" min="2" max="30" value="8" step="1" oninput="document.getElementById('ns-val').textContent=this.value">
    <label>지형 경계: <span id="nt-val">0.45</span></label>
    <input type="range" id="noise-thresh" min="0.1" max="0.9" value="0.45" step="0.05" oninput="document.getElementById('nt-val').textContent=this.value">
    <label>오브젝트 밀도: <span id="od-val">12</span>%</label>
    <input type="range" id="obj-density" min="0" max="40" value="12" step="1" oninput="document.getElementById('od-val').textContent=this.value">
    <label style="margin-top:4px">기본 지형:</label>
    <select id="pg-base"></select>
    <label>보조 지형:</label>
    <select id="pg-alt"></select>
    <label>오브젝트:</label>
    <div id="pg-obj-list" style="max-height:80px;overflow-y:auto;font-size:9px;margin:2px 0"></div>
    <button onclick="procGen()" style="background:#2a1a00;color:#ffcc44;border-color:#ffcc44;font-weight:bold;margin-top:4px">🎲 맵 생성</button>
    <button onclick="procGenObjs()" style="background:#1a002a;color:#cc88ff;border-color:#cc88ff">🦴 오브젝트만 재생성</button>
    <label style="color:#555;font-size:9px;margin-top:2px">노이즈로 지형 분리 + 랜덤 회전/밝기 + 오브젝트 오버레이</label>
  </div>
  <div class="sec">
    <h4>단축키</h4>
    <div style="color:#555;font-size:9px;line-height:1.8">
      S=스탬프 E=지우개 Space=이동<br>
      C=충돌 X=충돌지우기<br>
      Ctrl+Z=되돌리기 []=크기<br>
      1~9=팔레트 선택 마우스휠=줌
    </div>
  </div>
</div>
<input type="file" id="fileIn" style="display:none" accept=".json">
<input type="file" id="mapFileIn" style="display:none" accept=".json">
<input type="file" id="bgImgIn" style="display:none" accept="image/*">
<input type="file" id="customAssetIn" style="display:none" accept="image/*" multiple>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const T_GAME=40; // 게임 타일 크기 (내보내기용)
const T=8; // 에디터 내부 타일 크기 (렉 방지)
let stampSz=40, stampAlpha=1; // T=8 기준: 40px=5타일
let tool='stamp', selTile=0;
let stampRot=0, flipH=false, flipV=false;
let camX=0,camY=0,zoom=1;
let canvasW=40,canvasH=40; // 타일 단위
// ── 충돌맵 (선 그리기) ──
let colMap=null; // Uint8Array, 1=충돌, 0=통과. 크기=canvasW*canvasH (T단위)
let showCollision=true;
let colLineWidth=2; // 선 굵기 (T단위)
let _colLastX=-1,_colLastY=-1; // 드래그 중 이전 좌표
function initColMap(){colMap=new Uint8Array(canvasW*canvasH)}
function clearCollision(){if(colMap)colMap.fill(0);render()}
function _colPlot(tx,ty,val){
  const hw=Math.floor(colLineWidth/2);
  for(let dy=-hw;dy<=hw;dy++)for(let dx=-hw;dx<=hw;dx++){
    const px=tx+dx,py=ty+dy;
    if(px>=0&&py>=0&&px<canvasW&&py<canvasH)colMap[py*canvasW+px]=val;
  }
}
function _colLine(x0,y0,x1,y1,val){
  let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy;
  while(true){
    _colPlot(x0,y0,val);
    if(x0===x1&&y0===y1)break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx}
    if(e2<dx){err+=dx;y0+=sy}
  }
}
function colDraw(wx,wy,val){
  if(!colMap)initColMap();
  const tx=Math.floor(wx/T),ty=Math.floor(wy/T);
  if(tx<0||ty<0||tx>=canvasW||ty>=canvasH)return;
  if(_colLastX>=0)_colLine(_colLastX,_colLastY,tx,ty,val);
  else _colPlot(tx,ty,val);
  _colLastX=tx;_colLastY=ty;
  render();
}
function colDrawEnd(){_colLastX=-1;_colLastY=-1}
let dragging=false,dragBtn=-1,lastMX=0,lastMY=0;
let hoverX=0,hoverY=0;

// ══ STAGES — map_tiles.json에서 동적 로드 ══
let STAGES=[];
const HELLS=[
  {name:'1장 썩은숲',color:'#66ee55'},{name:'2장 벌레굴',color:'#aacc44'},
  {name:'3장 얼음굴',color:'#44ddee'},{name:'4장 화염지대',color:'#ff8844'},
  {name:'5장 지옥군단',color:'#ffcc44'},{name:'6장 사도마굴',color:'#bb77ff'},
  {name:'7장 지옥성',color:'#cc88ff'},
];
let currentHell=0, currentStage=0;
const mapStore={};

function buildChapterTabs(){
  const el=document.getElementById('ch-tabs');let html='';
  for(let i=0;i<HELLS.length;i++){
    const act=i===currentHell?'active':'';
    const bg=i===currentHell?`background:${HELLS[i].color}`:'';
    html+=`<div class="ch-tab ${act}" style="${bg}" onclick="switchHell(${i})">${i+1}장</div>`;
  }
  el.innerHTML=html;
}
function switchHell(h){currentHell=h;buildChapterTabs();buildStageList()}
function buildStageList(){
  const el=document.getElementById('stage-list');
  const stages=STAGES.filter(s=>s.hell===currentHell);let html='';
  for(const s of stages){
    const act=s.id===currentStage?'active':'';
    const hasSave=mapStore[s.id]?'#aaff66':'#333';
    html+=`<div class="st-item ${act}" onclick="switchStage(${s.id})">
      <span><span class="dot" style="display:inline-block;background:${hasSave}"></span>${s.floor}층</span>
      <span class="sz">${s.mw}×${s.mh}</span>
    </div>`;
  }
  el.innerHTML=html;
  document.getElementById('map-stats').textContent='저장: '+Object.keys(mapStore).length+'/'+STAGES.length;
}
function switchStage(sid){
  quickSaveCurrentMap(); // 캔버스 복사만 (toDataURL 없음 = 즉시)
  currentStage=sid;
  const s=STAGES.find(st=>st.id===sid);if(!s)return;
  canvasW=s.mw;canvasH=s.mh;
  document.getElementById('cw').value=canvasW;document.getElementById('ch').value=canvasH;
  initColMap(); // 맵 전환 시 충돌맵 리셋
  if(mapStore[sid])loadMapFromStore(sid);
  else{layers=[];initLayers();for(const l of layers){l.cvs.width=canvasW*T;l.cvs.height=canvasH*T}}
  camX=canvasW*T/2;camY=canvasH*T/2;
  zoom=Math.min(1,Math.min(C.width/(canvasW*T+100),C.height/(canvasH*T+100)));
  undoStack.length=0;_mapGuideSid=-1;buildMapGuideCache();buildStageList();render();
}
// 맵 저장: 캔버스 객체 직접 보관 (toDataURL 안 함 = 즉시)
function quickSaveCurrentMap(){
  if(!layers||!layers.length)return;
  const saved=[];
  for(const l of layers){
    const cp=document.createElement('canvas');cp.width=l.cvs.width;cp.height=l.cvs.height;
    cp.getContext('2d').drawImage(l.cvs,0,0);
    saved.push({name:l.name,visible:l.visible,cvs:cp});
  }
  mapStore[currentStage]={layers:saved,cam:{x:camX,y:camY,z:zoom}};
}
function saveCurrentMap(){
  quickSaveCurrentMap();buildStageList();
}
function loadMapFromStore(sid){
  const data=mapStore[sid];if(!data)return;
  layers=[];
  for(const ld of data.layers){
    const l=makeLayer(ld.name);l.visible=ld.visible;
    l.cvs.width=ld.cvs.width;l.cvs.height=ld.cvs.height;
    l.ctx.drawImage(ld.cvs,0,0);
    layers.push(l);
  }
  if(data.cam){camX=data.cam.x;camY=data.cam.y;zoom=data.cam.z||1}
  activeLayer=layers.length-1;buildLayerList();
}
function saveAllMaps(){
  quickSaveCurrentMap();
  // 파일 저장 시에만 toDataURL 실행
  const out={};
  for(const[k,v] of Object.entries(mapStore)){
    out[k]={cam:v.cam,layers:v.layers.map(l=>({name:l.name,visible:l.visible,data:l.cvs.toDataURL('image/png')}))};
  }
  const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
  const a=document.createElement('a');a.download='tile_maps_all.json';a.href=URL.createObjectURL(blob);a.click();
}
function loadAllMaps(){document.getElementById('mapFileIn').click()}
document.getElementById('mapFileIn').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      let cnt=0;
      for(const[k,v]of Object.entries(data)){
        const saved=[];let pending=v.layers.length,done=0;
        for(const ld of v.layers){
          const cp=document.createElement('canvas');

const undoStack=[];const MAX_UNDO=30;
function saveUndo(){
  const l=layers[activeLayer];
  const snap=document.createElement('canvas');snap.width=l.cvs.width;snap.height=l.cvs.height;
  snap.getContext('2d').drawImage(l.cvs,0,0);
  undoStack.push({layer:activeLayer,cvs:snap,col:colMap?new Uint8Array(colMap):null});
  if(undoStack.length>MAX_UNDO)undoStack.shift();
}
function saveColUndo(){
  // 충돌맵 전용 언두 (레이어 변경 없이 colMap만 저장)
  undoStack.push({layer:-1,col:colMap?new Uint8Array(colMap):null});
  if(undoStack.length>MAX_UNDO)undoStack.shift();
}
function undo(){
  if(!undoStack.length)return;
  const u=undoStack.pop();
  if(u.col&&colMap){colMap.set(u.col)}
  if(u.layer>=0){const l=layers[u.layer];if(l){l.ctx.clearRect(0,0,l.cvs.width,l.cvs.height);l.ctx.drawImage(u.cvs,0,0)}}
  render();
}

function _drawTileTransformed(ctx,img,x,y,sz){
  ctx.save();
  ctx.translate(x+sz/2, y+sz/2);
  ctx.rotate(stampRot*Math.PI/180);
  ctx.scale(flipH?-1:1, flipV?-1:1);
  ctx.drawImage(img, -sz/2-0.5, -sz/2-0.5, sz+1, sz+1);
  ctx.restore();
}
function stamp(wx,wy){
  const img=tileImgs[selTile];if(!img||!img.complete)return;
  const l=layers[activeLayer];if(!l)return;
  const sx=Math.floor(wx/stampSz)*stampSz;
  const sy=Math.floor(wy/stampSz)*stampSz;
  l.ctx.save();
  l.ctx.globalAlpha=stampAlpha;
  _drawTileTransformed(l.ctx,img,sx,sy,stampSz);
  l.ctx.globalAlpha=1;
  l.ctx.restore();
  render();
}
function setRot(deg){stampRot=deg;document.querySelectorAll('[id^=r]').forEach(b=>{if(b.id.match(/^r\d+$/))b.classList.remove('active')});const el=document.getElementById('r'+deg);if(el)el.classList.add('active')}

// ══ 맵 가이드 오버레이 ══
let showMapGuide=true;
let _mapTileData=null; // {stageId: {mw,mh,grid:[][]}}
let _mapGuideCache=null; // 현재 스테이지 가이드 캔버스
let _mapGuideSid=-1;
// map_tiles.json 로드
fetch('map_tiles.json').then(r=>r.json()).then(data=>{
  // STAGES 로드
  if(data.stages){STAGES=data.stages;console.log('[STAGES] loaded',STAGES.length,'stages from map_tiles.json')}
  // tileRLE 파싱
  _mapTileData={};
  const maps=data.maps||data;
  for(const[sid,v] of Object.entries(maps)){
    if(!v.tileRLE)continue;
    const mw=v.mw,mh=v.mh;
    const grid=[];for(let y=0;y<mh;y++){grid[y]=[];for(let x=0;x<mw;x++)grid[y][x]=1}
    const rle=v.tileRLE;let pos=0;
    for(let i=0;i<rle.length;i+=2){
      let val=rle[i];const cnt=rle[i+1];
      val=(val===1)?0:1;
      for(let j=0;j<cnt;j++){const y=~~(pos/mw),x=pos%mw;if(y<mh&&x<mw)grid[y][x]=val;pos++}
    }
    // 보스방 카빙
    const br=v.bossRoom;
    if(br){
      const bcx=br.cx,bcy=br.cy,brx=br.rx,bry=br.ry;
      if(br.shape==='ellipse'||br.shape==='circle'){
        for(let dy=-bry;dy<=bry;dy++)for(let dx=-brx;dx<=brx;dx++){
          if((dx*dx)/(brx*brx)+(dy*dy)/(bry*bry)<=1){
            const tx=bcx+dx,ty=bcy+dy;
            if(tx>=0&&tx<mw&&ty>=0&&ty<mh)grid[ty][tx]=0;
          }
        }
      }else{
        for(let dy=-bry;dy<=bry;dy++)for(let dx=-brx;dx<=brx;dx++){
          const tx=bcx+dx,ty=bcy+dy;
          if(tx>=0&&tx<mw&&ty>=0&&ty<mh)grid[ty][tx]=0;
        }
      }
      // 기둥
      if(br.pillars)for(const p of br.pillars){
        const pw=p.w||2,ph=p.h||2;
        for(let dy=0;dy<ph;dy++)for(let dx=0;dx<pw;dx++){
          const tx=bcx+p.dx+dx,ty=bcy+p.dy+dy;
          if(tx>=0&&tx<mw&&ty>=0&&ty<mh)grid[ty][tx]=1;
        }
      }
    }
    // 보스 복도 카빙
    const bc=v.bossCorridor;
    if(bc){
      const pts=[bc.from,...(bc.waypoints||[]),bc.to];
      const w=Math.max(3,~~((bc.width||6)/2));
      for(let i=0;i<pts.length-1;i++){
        const ax=pts[i].x,ay=pts[i].y,bx2=pts[i+1].x,by2=pts[i+1].y;
        const steps=Math.max(Math.abs(bx2-ax),Math.abs(by2-ay))+1;
        for(let s=0;s<=steps;s++){
          const t=steps?s/steps:0;
          const cx=~~(ax+(bx2-ax)*t),cy=~~(ay+(by2-ay)*t);
          for(let dy=-w;dy<=w;dy++)for(let dx=-w;dx<=w;dx++){
            const tx=cx+dx,ty=cy+dy;
            if(tx>=0&&tx<mw&&ty>=0&&ty<mh)grid[ty][tx]=0;
          }
        }
      }
    }
    _mapTileData[sid]={mw,mh,grid};
  }
  console.log('[MAP-GUIDE] loaded',Object.keys(_mapTileData).length,'maps');
  // UI 초기화
  buildChapterTabs();buildStageList();
  const _initStage=STAGES.find(s=>s.hell===currentHell);
  if(_initStage){currentStage=_initStage.id;switchStage(_initStage.id)}
  buildMapGuideCache();render();
}).catch(e=>console.warn('[MAP-GUIDE] map_tiles.json not found:',e));

function buildMapGuideCache(){
  const data=_mapTileData&&_mapTileData[currentStage];
  if(!data){_mapGuideCache=null;_mapGuideSid=currentStage;return}
  if(_mapGuideSid===currentStage&&_mapGuideCache)return;
  const cv=document.createElement('canvas');
  cv.width=data.mw*T;cv.height=data.mh*T;
  const gc=cv.getContext('2d');
  for(let y=0;y<data.mh;y++)for(let x=0;x<data.mw;x++){
    const v=data.grid[y][x];
    if(v===1){
      // 벽
      gc.fillStyle='#1a1a1a';gc.fillRect(x*T,y*T,T,T);
    }else{
      // 바닥
      gc.fillStyle='#2a3020';gc.fillRect(x*T,y*T,T,T);
    }
  }
  // 벽/바닥 경계선 강조
  gc.strokeStyle='rgba(255,200,50,0.3)';gc.lineWidth=0.5;
  for(let y=0;y<data.mh;y++)for(let x=0;x<data.mw;x++){
    if(data.grid[y][x]!==0)continue;
    // 위가 벽
    if(y>0&&data.grid[y-1][x]===1){gc.beginPath();gc.moveTo(x*T,y*T);gc.lineTo((x+1)*T,y*T);gc.stroke()}
    // 아래가 벽
    if(y<data.mh-1&&data.grid[y+1][x]===1){gc.beginPath();gc.moveTo(x*T,(y+1)*T);gc.lineTo((x+1)*T,(y+1)*T);gc.stroke()}
    // 왼쪽이 벽
    if(x>0&&data.grid[y][x-1]===1){gc.beginPath();gc.moveTo(x*T,y*T);gc.lineTo(x*T,(y+1)*T);gc.stroke()}
    // 오른쪽이 벽
    if(x<data.mw-1&&data.grid[y][x+1]===1){gc.beginPath();gc.moveTo((x+1)*T,y*T);gc.lineTo((x+1)*T,(y+1)*T);gc.stroke()}
  }
  _mapGuideCache=cv;_mapGuideSid=currentStage;
}
function toggleMapGuide(){
  showMapGuide=!showMapGuide;
  document.getElementById('t-guide').classList.toggle('active',showMapGuide);
  render();
}

// ══ 렌더링 (변경 시에만) ══
let _renderPending=false;
function render(){
  if(_renderPending)return;
  _renderPending=true;
  requestAnimationFrame(_doRender);
}
function _doRender(){
  _renderPending=false;
  const W=C.width,H=C.height;
  X.fillStyle='#050505';X.fillRect(0,0,W,H);
  X.save();
  X.translate(W/2,H/2);X.scale(zoom,zoom);X.translate(-camX,-camY);
  const cw=canvasW*T,ch=canvasH*T;
  // 캔버스 배경
  X.fillStyle='#0a0a0a';X.fillRect(0,0,cw,ch);
  // 맵 가이드 오버레이 (레이어 아래에 깔기)
  if(showMapGuide&&_mapGuideCache){
    X.globalAlpha=0.6;X.drawImage(_mapGuideCache,0,0);X.globalAlpha=1;
  }
  // 레이어 합성
  for(let i=0;i<layers.length;i++){
    if(!layers[i].visible)continue;
    X.drawImage(layers[i].cvs,0,0);
  }
  // 뷰포트 안에 보이는 그리드만 그리기
  const vx1=camX-W/2/zoom, vy1=camY-H/2/zoom;
  const vx2=camX+W/2/zoom, vy2=camY+H/2/zoom;
  const gx1=Math.max(0,Math.floor(vx1/stampSz)*stampSz);
  const gy1=Math.max(0,Math.floor(vy1/stampSz)*stampSz);
  X.strokeStyle='rgba(255,255,255,0.06)';X.lineWidth=0.5;
  for(let y=gy1;y<=Math.min(ch,vy2+stampSz);y+=stampSz){X.beginPath();X.moveTo(Math.max(0,vx1),y);X.lineTo(Math.min(cw,vx2),y);X.stroke()}
  for(let x=gx1;x<=Math.min(cw,vx2+stampSz);x+=stampSz){X.beginPath();X.moveTo(x,Math.max(0,vy1));X.lineTo(x,Math.min(ch,vy2));X.stroke()}
  // 외곽선
  X.strokeStyle='#ffea0033';X.lineWidth=2;X.strokeRect(0,0,cw,ch);
  // 커서 미리보기
  if(tool==='stamp'&&tileImgs[selTile]&&tileImgs[selTile].complete){
    const sx=Math.floor(hoverX/stampSz)*stampSz, sy=Math.floor(hoverY/stampSz)*stampSz;
    X.globalAlpha=0.4;_drawTileTransformed(X,tileImgs[selTile],sx,sy,stampSz);
    X.globalAlpha=1;X.strokeStyle='#ffea0088';X.lineWidth=1;X.strokeRect(sx,sy,stampSz,stampSz);
  }else if(tool==='erase'){
    const sx=Math.floor(hoverX/stampSz)*stampSz, sy=Math.floor(hoverY/stampSz)*stampSz;
    X.strokeStyle='#ff440088';X.lineWidth=1;X.setLineDash([4,4]);X.strokeRect(sx,sy,stampSz,stampSz);X.setLineDash([]);
  }else if(tool==='collision'||tool==='col-erase'){
    const tx=Math.floor(hoverX/T),ty=Math.floor(hoverY/T);
    const hw=Math.floor(colLineWidth/2);
    const isCol=tool==='collision';
    X.fillStyle=isCol?'rgba(255,40,40,0.5)':'rgba(40,255,40,0.5)';
    X.fillRect((tx-hw)*T,(ty-hw)*T,colLineWidth*T,colLineWidth*T);
    // 십자선
    X.strokeStyle=isCol?'#ff0000':'#00ff00';X.lineWidth=0.5;
    X.beginPath();X.moveTo(hoverX-20,hoverY);X.lineTo(hoverX+20,hoverY);X.moveTo(hoverX,hoverY-20);X.lineTo(hoverX,hoverY+20);X.stroke();
  }
  // 에셋 커서 미리보기
  if(tool==='asset'&&_caSelIdx>=0&&_caAssets[_caSelIdx]&&_caAssets[_caSelIdx].img.complete){
    const _caImg=_caAssets[_caSelIdx].img;
    X.save();X.translate(hoverX,hoverY);X.rotate(_caRot*Math.PI/180);
    if(_caFlip)X.scale(-1,1);
    X.globalAlpha=0.5*_caAlpha;
    X.drawImage(_caImg,-_caSz/2,-_caSz/2,_caSz,_caSz);
    X.restore();X.globalAlpha=1;
    X.strokeStyle='#ffaa0088';X.lineWidth=1;X.strokeRect(hoverX-_caSz/2,hoverY-_caSz/2,_caSz,_caSz);
  }
  // 충돌맵 오버레이
  if(showCollision&&colMap){
    X.fillStyle='rgba(255,40,40,0.3)';
    const tx1=Math.max(0,Math.floor(vx1/T)),ty1=Math.max(0,Math.floor(vy1/T));
    const tx2=Math.min(canvasW,Math.ceil(vx2/T)+1),ty2=Math.min(canvasH,Math.ceil(vy2/T)+1);
    for(let ty=ty1;ty<ty2;ty++)for(let tx=tx1;tx<tx2;tx++){
      if(colMap[ty*canvasW+tx])X.fillRect(tx*T,ty*T,T,T);
    }
  }
  X.restore();
  const s=STAGES.find(st=>st.id===currentStage);
  document.getElementById('hud').innerHTML=
    `<b>${s?HELLS[s.hell].name+' '+s.floor+'층':''}</b> | <b>${TILES[selTile].name}</b> | 줌:${zoom.toFixed(1)} | 스탬프:${stampSz}px | ${canvasW}×${canvasH}`;
}

// ══ 마우스 이벤트 ══
function screenToWorld(mx,my){
  return{x:(mx-C.width/2)/zoom+camX, y:(my-C.height/2)/zoom+camY};
}
C.addEventListener('mousedown',e=>{
  e.preventDefault();
  const w=screenToWorld(e.offsetX,e.offsetY);
  dragging=true;dragBtn=e.button;lastMX=e.offsetX;lastMY=e.offsetY;
  if(tool==='pan'||e.button===1){return}
  if(e.button===0){
    if(tool==='stamp'){saveUndo();stamp(w.x,w.y)}
    else if(tool==='erase'){saveUndo();eraseAt(w.x,w.y)}
    else if(tool==='collision'){saveColUndo();colDraw(w.x,w.y,1)}
    else if(tool==='col-erase'){saveColUndo();colDraw(w.x,w.y,0)}
    else if(tool==='asset'){_stampAsset(w.x,w.y)}
  }
});
let _lastMoveRender=0;
C.addEventListener('mousemove',e=>{
  const w=screenToWorld(e.offsetX,e.offsetY);
  hoverX=w.x;hoverY=w.y;
  if(dragging){
    if(tool==='pan'||dragBtn===1){
      const dx=(e.offsetX-lastMX)/zoom,dy=(e.offsetY-lastMY)/zoom;
      camX-=dx;camY-=dy;
      lastMX=e.offsetX;lastMY=e.offsetY;
      render();return;
    }else if(dragBtn===0){
      if(tool==='stamp')stamp(w.x,w.y);
      else if(tool==='erase')eraseAt(w.x,w.y);
      else if(tool==='collision')colDraw(w.x,w.y,1);
      else if(tool==='col-erase')colDraw(w.x,w.y,0);
      else if(tool==='asset'){_stampAsset(w.x,w.y);return}
      lastMX=e.offsetX;lastMY=e.offsetY;
      return;
    }
  }
  // 호버 미리보기: 30fps 제한
  const now=performance.now();
  if(now-_lastMoveRender>33){_lastMoveRender=now;render()}
});
C.addEventListener('mouseup',()=>{dragging=false;dragBtn=-1;colDrawEnd()});
C.addEventListener('mouseleave',()=>{dragging=false;dragBtn=-1;colDrawEnd()});
C.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1;
  zoom=Math.max(0.1,Math.min(5,zoom*d));
},{passive:false});
C.addEventListener('contextmenu',e=>e.preventDefault());

// ══ 키보드 ══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.ctrlKey&&(e.key==='z'||e.key==='Z'||e.code==='KeyZ')){e.preventDefault();undo();return}
  const code=e.code;
  switch(code){
    case 'KeyS':setTool('stamp');break;
    case 'KeyE':setTool('erase');break;
    case 'KeyC':setTool('collision');break;
    case 'KeyX':setTool('col-erase');break;
    case 'KeyI':setTool('asset');break;
    case 'Space':e.preventDefault();setTool('pan');break;
    case 'BracketLeft':stampSz=Math.max(8,stampSz-8);document.getElementById('stamp-sz').value=stampSz;document.getElementById('sz-val').textContent=(stampSz/8);break;
    case 'BracketRight':stampSz=Math.min(80,stampSz+8);document.getElementById('stamp-sz').value=stampSz;document.getElementById('sz-val').textContent=(stampSz/8);break;
    case 'KeyR':setRot((stampRot+90)%360);break;
    case 'KeyF':toggleFlipH();break;
    case 'KeyV':if(!e.ctrlKey)toggleFlipV();break;
    case 'ArrowRight':e.preventDefault();setRot((stampRot+90)%360);break;
    case 'ArrowLeft':e.preventDefault();setRot((stampRot+270)%360);break;
    case 'ArrowUp':e.preventDefault();toggleFlipV();break;
    case 'ArrowDown':e.preventDefault();toggleFlipH();break;
  }
  if(code>='Digit1'&&code<='Digit9'){const i=+code[5]-1;if(i<TILES.length)selectTile(i)}
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space')setTool('stamp');
});

// ══ 배경 이미지 불러오기 ══
let _bgLoadedImg=null; // 불러온 원본 이미지 보관 (재적용용)
function applyBgImage(img){
  if(!img)return;
  const mode=document.getElementById('bg-mode').value;
  const scale=(+document.getElementById('bg-scale').value||100)/100;
  const l=layers[activeLayer];if(!l)return;
  saveUndo();
  // 레이어 캔버스를 맵 크기에 강제 맞춤
  const MW=canvasW*T, MH=canvasH*T;
  if(l.cvs.width!==MW||l.cvs.height!==MH){
    l.cvs.width=MW;l.cvs.height=MH;
  }
  l.ctx.clearRect(0,0,MW,MH);
  console.log('[BG-IMG] map='+MW+'x'+MH+' img='+img.width+'x'+img.height+' mode='+mode+' scale='+scale);
  if(mode==='stretch'){
    l.ctx.drawImage(img,0,0,MW,MH);
  }else if(mode==='fit'){
    const coverRatio=Math.max(MW/img.width,MH/img.height)*scale;
    const dw=img.width*coverRatio, dh=img.height*coverRatio;
    l.ctx.drawImage(img,(MW-dw)/2,(MH-dh)/2,dw,dh);
  }else{
    const tw=MW*scale, th=tw*(img.height/img.width);
    for(let y=0;y<MH;y+=th){
      for(let x=0;x<MW;x+=tw){
        l.ctx.drawImage(img,x,y,tw,th);
      }
    }
  }
  render();
}

function _buildCAList(){

function _stampAsset(wx,wy){
  if(_caSelIdx<0||!_caAssets[_caSelIdx])return;
  const a=_caAssets[_caSelIdx];
  if(!a.img.complete)return;
  saveUndo();
  const l=layers[activeLayer];
  const sz=_caSz;
  l.ctx.save();
  l.ctx.translate(wx,wy);
  l.ctx.rotate(_caRot*Math.PI/180);
  if(_caFlip)l.ctx.scale(-1,1);
  l.ctx.globalAlpha=_caAlpha;
  l.ctx.drawImage(a.img,-sz/2,-sz/2,sz,sz);
  l.ctx.restore();
  l.ctx.globalAlpha=1;
  render();
}

// ══ 절차적 맵 생성 (Procedural Map Generator) ══
// ══════════════════════════════════════════════

// ── Value Noise ──
const _PN=256;const _perm=new Uint8Array(_PN*2);
function _seedNoise(){for(let i=0;i<_PN;i++)_perm[i]=i;for(let i=_PN-1;i>0;i--){const j=Math.random()*i|0;const t=_perm[i];_perm[i]=_perm[j];_perm[j]=t}for(let i=0;i<_PN;i++)_perm[i+_PN]=_perm[i]}
function _hash(x,y){return _perm[(_perm[x&255]+y)&255]/255}
function _lerp(a,b,t){return a+(b-a)*t}
function _smooth(t){return t*t*(3-2*t)}
function getNoise(x,y){
  const xi=Math.floor(x),yi=Math.floor(y);
  const xf=_smooth(x-xi),yf=_smooth(y-yi);
  const a=_hash(xi,yi),b=_hash(xi+1,yi),c=_hash(xi,yi+1),d=_hash(xi+1,yi+1);
  return _lerp(_lerp(a,b,xf),_lerp(c,d,xf),yf);
}
function _fbm(x,y,oct){let v=0,a=1,f=1,t=0;for(let i=0;i<oct;i++){v+=getNoise(x*f,y*f)*a;t+=a;a*=.5;f*=2}return v/t}

// ── 절차적 생성: 베이스 지형 ──
function procGen(){
  _seedNoise();
  const scale=+document.getElementById('noise-scale').value||8;
  const thresh=+document.getElementById('noise-thresh').value||0.45;
  const baseIdx=+document.getElementById('pg-base').value||0;
  const altIdx=+document.getElementById('pg-alt').value||1;
  const baseImg=tileImgs[baseIdx], altImg=tileImgs[altIdx];
  if(!baseImg||!baseImg.complete||!altImg||!altImg.complete){alert('타일 이미지 로드 중');return}

  // 배경 레이어에 그리기
  if(!layers.length)initLayers();
  const l=layers[0];
  l.ctx.clearRect(0,0,l.cvs.width,l.cvs.height);

  const tw=canvasW*T, th=canvasH*T;
  const step=stampSz||40;

  for(let y=0;y<th;y+=step){
    for(let x=0;x<tw;x+=step){
      const nx=x/tw*scale, ny=y/th*scale;
      const n=_fbm(nx,ny,4);
      const img=n<thresh?baseImg:altImg;

      // 랜덤 변형
      const rot=[0,90,180,270][Math.random()*4|0];
      const flip=Math.random()<0.5;
      const bright=0.9+Math.random()*0.2; // 0.9~1.1

      l.ctx.save();
      l.ctx.translate(x+step/2,y+step/2);
      l.ctx.rotate(rot*Math.PI/180);
      if(flip)l.ctx.scale(-1,1);
      l.ctx.globalAlpha=bright;
      l.ctx.drawImage(img,-step/2-0.5,-step/2-0.5,step+1,step+1);
      l.ctx.restore();
    }
  }
  l.ctx.globalAlpha=1;

  // 오브젝트 레이어 자동 생성
  procGenObjs();
  render();
}

// ── 절차적 생성: 오브젝트 오버레이 ──
function procGenObjs(){
  // 오브젝트 레이어 확보 (2번째 레이어)
  while(layers.length<2)addLayer();
  const ol=layers[1];
  ol.name='오브젝트';
  ol.ctx.clearRect(0,0,ol.cvs.width,ol.cvs.height);

  const density=(+document.getElementById('obj-density').value||12)/100;
  const cbs=document.querySelectorAll('.pg-obj-cb:checked');
  const objIdxs=[];cbs.forEach(cb=>objIdxs.push(+cb.value));
  if(!objIdxs.length){buildLayerList();render();return}

  const tw=canvasW*T, th=canvasH*T;
  const step=stampSz||40;

  for(let y=0;y<th;y+=step){
    for(let x=0;x<tw;x+=step){
      if(Math.random()>density)continue;
      const idx=objIdxs[Math.random()*objIdxs.length|0];
      const img=tileImgs[idx];
      if(!img||!img.complete)continue;

      // 타일 경계 약간 넘기 (유기적 배치)
      const ox=x+(Math.random()-.5)*step*0.4;
      const oy=y+(Math.random()-.5)*step*0.4;
      const rot=Math.random()*360;
      const sz=step*(0.6+Math.random()*0.6); // 60~120% 크기
      const bright=0.8+Math.random()*0.3;

      ol.ctx.save();
      ol.ctx.translate(ox+step/2,oy+step/2);
      ol.ctx.rotate(rot*Math.PI/180);
      ol.ctx.globalAlpha=bright;
      ol.ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
      ol.ctx.restore();
    }
  }
  ol.ctx.globalAlpha=1;
  buildLayerList();render();
}
