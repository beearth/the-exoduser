<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Boss 3D Overlay Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#gameFrame{width:100%;height:100%;border:none}
#overlay3d{position:fixed;inset:0;pointer-events:none;z-index:50}
#boss3d-hud{position:fixed;bottom:12px;right:12px;color:#0f0;font:13px/1.5 monospace;
  background:rgba(0,0,0,.7);padding:8px 12px;border-radius:6px;z-index:60;pointer-events:none;
  white-space:pre;max-width:420px}
#boss3d-keys{position:fixed;top:12px;right:12px;color:#ff0;font:bold 13px/1.5 monospace;
  background:rgba(0,0,0,.8);padding:6px 10px;border-radius:6px;z-index:60;pointer-events:none;
  white-space:pre}
</style>
</head>
<body>
<iframe id="gameFrame" src="/game.html"></iframe>
<canvas id="overlay3d"></canvas>
<div id="boss3d-keys">F10: 보스전 | F9: 무적 | F8: 프로파일 | Shift+R: 리셋</div>
<div id="boss3d-hud">Boss 3D: 초기화 중...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const hud = document.getElementById('boss3d-hud');
const overlay = document.getElementById('overlay3d');
const iframe = document.getElementById('gameFrame');

// ══════════════════════════════
// ── Three.js 씬 셋업
// ══════════════════════════════
const renderer = new THREE.WebGLRenderer({ canvas: overlay, alpha: true, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// 직교 카메라 — 정면(Z축) 배치, frustum = 화면 절반 높이(CSS px)
// 이렇게 하면 Three.js 월드 1유닛 = CSS 1픽셀
const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
cam.position.set(0, 0, 50);
cam.lookAt(0, 0, 0);

const dirLight = new THREE.DirectionalLight(0xffcc88, 1.0);
dirLight.position.set(100, 200, 300);
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0x887799, 0.6));
const rimLight = new THREE.DirectionalLight(0x4444aa, 0.3);
rimLight.position.set(-100, 50, -200);
scene.add(rimLight);

// ── GLB 로드 ──
// bossPivot: 위치 + facing 회전 (syncBoss에서 조작)
// bossModel: GLB scene, 자세 보정만 (X -90도 = 탑다운에서 서있게)
let bossPivot = null;
let bossModel = null;
let bossMixer = null;
let bossReady = false;
let bossSize = new THREE.Vector3();
let bossMeshes = []; // flash 효과용
let bossOrigMats = []; // 원본 머티리얼 백업

const loader = new GLTFLoader();
loader.load(
  '/boss_3d_poc/assets/boss_01.glb',
  (gltf) => {
    bossModel = gltf.scene;

    // 1) 높이 기준 스케일
    const box = new THREE.Box3().setFromObject(bossModel);
    const sz = box.getSize(new THREE.Vector3());
    const sc = 2.2 / sz.y;
    bossModel.scale.setScalar(sc);

    // 2) 모델 중심 → 원점 정렬 (탑다운에서 3D 중심 = 2D 보스 중심)
    const box2 = new THREE.Box3().setFromObject(bossModel);
    const center = box2.getCenter(new THREE.Vector3());
    bossModel.position.sub(center); // 모델 중심을 원점에 맞춤

    // 메시 수집 + 원본 머티리얼 백업 (flash용)
    bossModel.traverse(c => {
      if (c.isMesh) {
        c.castShadow = true;
        c.receiveShadow = true;
        bossMeshes.push(c);
        bossOrigMats.push(c.material);
      }
    });

    // 4) Pivot Group으로 감싸기
    bossPivot = new THREE.Group();
    bossPivot.add(bossModel);
    bossPivot.visible = false;
    scene.add(bossPivot);

    // bossSize 측정 (pivot 기준)
    bossSize = new THREE.Box3().setFromObject(bossPivot).getSize(new THREE.Vector3());

    // 애니메이션
    if (gltf.animations.length > 0) {
      bossMixer = new THREE.AnimationMixer(bossModel);
      bossMixer.clipAction(gltf.animations[0]).play();
    }
    bossReady = true;
    log('GLB OK', `${bossSize.x.toFixed(1)}x${bossSize.y.toFixed(1)}x${bossSize.z.toFixed(1)}`);
  },
  null,
  (err) => { log('GLB 실패', err.message); }
);

// flash 머티리얼 (피격 시 흰색)
const flashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

// ── 리사이즈 ──
// frustum = 화면 절반(CSS px) → Three.js 1유닛 = 1 CSS px
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  cam.left = -w / 2;
  cam.right = w / 2;
  cam.top = h / 2;
  cam.bottom = -h / 2;
  cam.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════
// ── 브릿지 주입
// ══════════════════════════════
let _bridgeReady = false;
function injectBridge() {
  if (_bridgeReady) return;
  try {
    const doc = iframe.contentDocument;
    if (!doc || !doc.body) return;
    if (iframe.contentWindow._b3d) { _bridgeReady = true; return; }
    const s = doc.createElement('script');
    s.textContent = `
      // ── 3D 모드 상태 ──
      window._b3d_testMode = false;
      window._b3d_preBackup = null;
      window._b3d_lastHitT = 0;   // 마지막 보스 피격 시각
      window._b3d_prevHP = -1;    // 이전 프레임 보스 HP

      // ── 매 프레임 호출: 2D 보스 숨기기 + 피격 감지 ──
      window._b3d_tick = () => {
        if (!window._b3d_testMode) return;
        const boss = (typeof G!=='undefined' && G._bossRef && G._bossRef.alive) ? G._bossRef : null;
        if (!boss) return;

        // 2D 보스 렌더링 차단: _spawnT를 999로 유지
        // (렌더러가 _spawnT>0이면 alpha=max(0,1-_spawnT/20)=0 → continue로 스킵)
        boss._spawnT = 999;

        // 피격 감지 (HP 감소 or flashT)
        if (window._b3d_prevHP > 0 && boss.hp < window._b3d_prevHP) {
          window._b3d_lastHitT = performance.now();
        }
        if (boss.flashT > 0) {
          window._b3d_lastHitT = performance.now();
        }
        window._b3d_prevHP = boss.hp;

        // 프로파일링 틱
        if (window._b3d_profiling) window._b3d_profTick();
      };

      // ── 상태 읽기 ──
      window._b3d = () => {
        try {
          // 틱 실행
          if (window._b3d_testMode) window._b3d_tick();
          // 프로파일링은 테스트모드 외에도 동작
          else if (window._b3d_profiling) window._b3d_profTick();

          const boss = (typeof G!=='undefined'&&G._bossRef&&G._bossRef.alive) ? G._bossRef : null;
          // 보스 사망 체크 (alive=false이지만 ref 존재)
          const deadBoss = (typeof G!=='undefined'&&G._bossRef&&!G._bossRef.alive) ? G._bossRef : null;
          const c = document.getElementById('c');
          return {
            ok: typeof G!=='undefined' && typeof P!=='undefined' && P!==null,
            gameOn: typeof G!=='undefined' && G.on,
            bossAlive: typeof G!=='undefined' && G.bossAlive,
            bossX: boss ? boss.x : (deadBoss ? deadBoss.x : 0),
            bossY: boss ? boss.y : (deadBoss ? deadBoss.y : 0),
            bossR: boss ? boss.r : 20,
            bossEtype: boss ? boss.etype : -1,
            bossHP: boss ? boss.hp : 0,
            bossMHP: boss ? boss.mhp : 1,
            bossVisible: !!boss,
            bossDead: !!deadBoss && !boss,
            bossState: boss ? boss.s : '',
            bossFacing: boss ? boss.facing : 0,
            bossFlashT: boss ? (boss.flashT || 0) : 0,
            bossHitT: window._b3d_lastHitT || 0,
            bossStunned: boss ? (boss.stunned > 0) : false,
            playerX: (typeof P!=='undefined' && P) ? P.x : 0,
            playerY: (typeof P!=='undefined' && P) ? P.y : 0,
            playerHP: (typeof P!=='undefined' && P) ? P.hp : 0,
            playerMHP: (typeof P!=='undefined' && P) ? P.mhp : 0,
            camX: typeof G!=='undefined' ? G.cam.x : 0,
            camY: typeof G!=='undefined' ? G.cam.y : 0,
            canvasW: c ? c.width : 0,
            canvasH: c ? c.height : 0,
            stage: typeof G!=='undefined' ? G.stage : 0,
            _bossArena: typeof G!=='undefined' && !!G._bossArena,
            gameFps: (typeof _prof!=='undefined' && _prof.t>0) ? Math.round(1000/_prof.t) : 0,
            testMode: !!window._b3d_testMode,
            dpr: (typeof _dpr!=='undefined') ? _dpr : (window.devicePixelRatio||1),
            resScale: (typeof OPT!=='undefined' && OPT.resScale) ? OPT.resScale/100 : 1
          };
        } catch(e) { return null; }
      };

      // ── F10: 보스전 진입 ──
      window._b3d_enterBoss = () => {
        if(typeof G==='undefined'||!G.on||!P) return 'GAME_NOT_RUNNING';
        if(G._bossArena) return 'ALREADY_IN_ARENA';
        if(!G.map||!G.map.length) return 'NO_MAP';

        window._b3d_preBackup = {
          map: G.map.map(r=>[...r]), mw:G.mw, mh:G.mh,
          rooms: JSON.parse(JSON.stringify(G.rooms)),
          exits: G.exits.slice(),
          bossAlive: G.bossAlive,
          bossGate: G.bossGate,
          bossGateOpen: G.bossGateOpen,
          bossSealed: G.bossSealed,
          _bossCx: G._bossCx, _bossCy: G._bossCy,
          _gateY: G._gateY, _bossEntY: G._bossEntY,
          playerX: P.x, playerY: P.y,
          camX: G.cam.x, camY: G.cam.y,
          spawnHoles: G.spawnHoles ? G.spawnHoles.slice() : [],
          rifts: G.rifts ? G.rifts.slice() : []
        };

        try {
          _enterBossArena();
          window._b3d_testMode = true;
          window._b3d_prevHP = -1;
          window._b3d_lastHitT = 0;
          if(P) { P.hp = P.mhp; P.st = P.mst; P.mp = P.mmp; }
          return 'OK';
        } catch(e) { return 'ERROR: ' + e.message; }
      };

      // ── F10: 복귀 ──
      window._b3d_exitBoss = () => {
        if(typeof G==='undefined'||!P) return 'GAME_NOT_RUNNING';
        if(!G._bossArena) return 'NOT_IN_ARENA';
        const b = window._b3d_preBackup;
        if(!b) return 'NO_BACKUP';

        try {
          // 보스 2D 가시성 복원 (혹시 남아있으면)
          if(G._bossRef) G._bossRef._spawnT = 0;

          if(typeof ens!=='undefined') ens.length=0;
          if(typeof projs!=='undefined') {
            for(let i=0;i<projs.length;i++) if(typeof _recycleProj==='function') _recycleProj(projs[i]);
            projs.length=0;
          }
          if(typeof pProjs!=='undefined') {
            for(let i=0;i<pProjs.length;i++) if(typeof _recyclePProj==='function') _recyclePProj(pProjs[i]);
            pProjs.length=0;
          }
          if(typeof worldItems!=='undefined') worldItems.length=0;
          G.parts=[];G.txts=[];G.hitStop=0;G.slowMo=0;

          G.map=b.map;G.mw=b.mw;G.mh=b.mh;G.rooms=b.rooms;G.exits=b.exits;
          G._fow=new Uint8Array(b.mw*b.mh);G._fowDirty=true;
          G.bossAlive=b.bossAlive;
          G.bossGate=b.bossGate;G.bossGateOpen=b.bossGateOpen!==undefined?b.bossGateOpen:true;
          G.bossSealed=b.bossSealed!==undefined?b.bossSealed:false;
          G._bossCx=b._bossCx;G._bossCy=b._bossCy;G._gateY=b._gateY;G._bossEntY=b._bossEntY;
          G.spawnHoles=b.spawnHoles;G.rifts=b.rifts;

          G._bossArena=false;G._bossLoadPhase=0;G._bossLoadFade=0;G._bfxBolt=null;
          G._bossRef=null;G._crT=0;G.stageCleared=false;

          P.x=b.playerX;P.y=b.playerY;P.s='idle';P.iframes=60;
          P.hp=P.mhp;P.st=P.mst;P.mp=P.mmp;
          G.cam.x=b.camX;G.cam.y=b.camY;

          if(typeof buildMapCache==='function') buildMapCache();

          // 사망 상태에서 복귀 시 게임 재개
          if(!G.on) G.on = true;
          // 사망 UI 닫기
          const deathEl = document.getElementById('death');
          if(deathEl) { deathEl.classList.remove('on'); deathEl.style.opacity='0'; deathEl.style.pointerEvents='none'; }

          window._b3d_testMode = false;
          window._b3d_preBackup = null;
          return 'OK';
        } catch(e) { return 'ERROR: ' + e.message; }
      };

      // ── 프로파일러 ──
      window._b3d_profiling = false;
      window._b3d_profFrames = [];
      window._b3d_profStart = 0;

      window._b3d_profTick = () => {
        if (!window._b3d_profiling) return;
        // 30초 자동 종료
        if (performance.now() - window._b3d_profStart > 30000) {
          window._b3d_profEnd();
          window.parent.postMessage({type:'b3d_prof', active:false}, '*');
          return;
        }
        const f = {
          t: performance.now(),
          fps: (typeof _prof!=='undefined' && _prof.t>0) ? 1000/_prof.t : 0,
          S0: typeof _dpT0!=='undefined' ? _dpT0 : 0,
          S1: typeof _dpT1!=='undefined' ? _dpT1 : 0,
          S2: typeof _dpT2!=='undefined' ? _dpT2 : 0,
          S3: typeof _dpT3!=='undefined' ? _dpT3 : 0,
          S4: typeof _dpT4!=='undefined' ? _dpT4 : 0,
          S5: typeof _dpT5!=='undefined' ? _dpT5 : 0,
          S6: typeof _dpT6!=='undefined' ? _dpT6 : 0,
          S7: typeof _dpT7!=='undefined' ? _dpT7 : 0,
          ens: typeof ens!=='undefined' ? ens.filter(e=>e.alive).length : 0,
          projs: (typeof projs!=='undefined' ? projs.length : 0) + (typeof pProjs!=='undefined' ? pProjs.length : 0),
          parts: typeof G!=='undefined' && G.parts ? G.parts.length : 0,
          traps: (typeof G!=='undefined' && G._fireZones ? G._fireZones.length : 0) +
                 (typeof G!=='undefined' && G._boneWalls ? G._boneWalls.length : 0) +
                 (typeof G!=='undefined' && G._darkZones ? G._darkZones.length : 0),
          dc: typeof _PERF_PROF!=='undefined' ? _PERF_PROF.drawCalls : 0,
          frameMs: typeof _prof!=='undefined' ? _prof.t : 0
        };
        window._b3d_profFrames.push(f);
      };

      window._b3d_profEnd = () => {
        window._b3d_profiling = false;
        const frames = window._b3d_profFrames;
        if (!frames || frames.length < 2) { console.log('[PROF] 데이터 부족'); return; }

        const n = frames.length;
        const avg = (arr) => arr.reduce((a,b)=>a+b,0)/arr.length;
        const fpsArr = frames.map(f=>f.fps);
        const dcArr = frames.map(f=>f.dc);

        // 섹션별 평균
        const sections = ['S0','S1','S2','S3','S4','S5','S6','S7'];
        const sAvg = {};
        sections.forEach(s => { sAvg[s] = avg(frames.map(f=>f[s])); });

        // top3 느린 섹션
        const sorted = sections.slice().sort((a,b) => sAvg[b] - sAvg[a]);
        const top3 = sorted.slice(0,3);

        console.log('╔══════════════════════════════════════╗');
        console.log('║     PERF PROFILE REPORT (30s)        ║');
        console.log('╠══════════════════════════════════════╣');
        console.log('║ Frames: ' + n);
        console.log('║ Avg FPS: ' + avg(fpsArr).toFixed(1));
        console.log('║ Min FPS: ' + Math.min(...fpsArr).toFixed(1));
        console.log('║ Avg DrawCalls: ' + avg(dcArr).toFixed(0));
        console.log('║ Avg ens: ' + avg(frames.map(f=>f.ens)).toFixed(0));
        console.log('║ Avg projs: ' + avg(frames.map(f=>f.projs)).toFixed(0));
        console.log('║ Avg parts: ' + avg(frames.map(f=>f.parts)).toFixed(0));
        console.log('║ Avg traps: ' + avg(frames.map(f=>f.traps)).toFixed(0));
        console.log('╠── Section Avg (ms) ──────────────────╣');
        sections.forEach(s => {
          const mark = top3.includes(s) ? ' ◀ TOP' + (top3.indexOf(s)+1) : '';
          console.log('║ ' + s + ': ' + sAvg[s].toFixed(2) + 'ms' + mark);
        });
        console.log('╠── Top 3 Slowest ─────────────────────╣');
        top3.forEach((s,i) => console.log('║ #' + (i+1) + ' ' + s + ': ' + sAvg[s].toFixed(2) + 'ms'));
        console.log('╚══════════════════════════════════════╝');

        // CSV 다운로드
        const header = 'time,fps,S0,S1,S2,S3,S4,S5,S6,S7,ens,projs,parts,traps,drawCalls,frameMs';
        const rows = frames.map(f =>
          [f.t.toFixed(0),f.fps.toFixed(1),f.S0.toFixed(2),f.S1.toFixed(2),f.S2.toFixed(2),f.S3.toFixed(2),
           f.S4.toFixed(2),f.S5.toFixed(2),f.S6.toFixed(2),f.S7.toFixed(2),
           f.ens,f.projs,f.parts,f.traps,f.dc,f.frameMs.toFixed(2)].join(',')
        );
        const csv = header + '\\n' + rows.join('\\n');
        const blob = new Blob([csv], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'boss3d_perf_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.csv';
        a.click(); URL.revokeObjectURL(url);
        console.log('[PROF] CSV 다운로드: ' + a.download);
      };

      // ── 리셋 ──
      window._b3d_reset = () => {
        if(G._bossArena && window._b3d_preBackup) window._b3d_exitBoss();
        window._b3d_testMode = false;
        window._b3d_preBackup = null;
        if(typeof P!=='undefined'&&P){P.hp=P.mhp;P.st=P.mst;P.mp=P.mmp;P.iframes=60}
        return 'OK';
      };

      // ── iframe 내부 키 핸들러 (F10/F9/Shift+R) ──
      // iframe에 포커스가 있을 때 부모 keydown이 안 잡히므로 여기서 처리
      window._b3d_godMode = false;
      document.addEventListener('keydown', (e) => {
        // F10: 보스전 토글
        if (e.code === 'F10' || e.key === 'F10') {
          e.preventDefault();
          e.stopImmediatePropagation();
          if (!window._b3d_testMode) {
            const r = window._b3d_enterBoss();
            window.parent.postMessage({type:'b3d_boss', action:'enter', result:r}, '*');
          } else {
            const r = window._b3d_exitBoss();
            window.parent.postMessage({type:'b3d_boss', action:'exit', result:r}, '*');
          }
          return;
        }
        // F9: 무적 토글
        if (e.code === 'F9' || e.key === 'F9') {
          e.preventDefault();
          e.stopImmediatePropagation();
          window._b3d_godMode = !window._b3d_godMode;
          window.parent.postMessage({type:'b3d_god', active:window._b3d_godMode}, '*');
          return;
        }
        // F8: 프로파일러 토글
        if (e.code === 'F8' || e.key === 'F8') {
          e.preventDefault();
          e.stopImmediatePropagation();
          window._b3d_profiling = !window._b3d_profiling;
          if (window._b3d_profiling) {
            window._b3d_profFrames = [];
            window._b3d_profStart = performance.now();
            console.log('[PROF] 프로파일링 시작 (30초 후 자동 종료)');
          } else {
            window._b3d_profEnd();
          }
          window.parent.postMessage({type:'b3d_prof', active:window._b3d_profiling}, '*');
          return;
        }
        // Shift+R: 리셋
        if ((e.key === 'r' || e.key === 'R') && e.shiftKey) {
          e.preventDefault();
          e.stopImmediatePropagation();
          window._b3d_reset();
          window._b3d_godMode = false;
          window.parent.postMessage({type:'b3d_reset'}, '*');
          return;
        }
      }, true); // capture phase — 게임 핸들러보다 먼저
    `;
    doc.body.appendChild(s);
    _bridgeReady = true;
    log('브릿지 주입 OK');
  } catch (e) { log('브릿지 실패:', e.message); }
}

// ── 게임 상태 읽기 ──
function getGameState() {
  try {
    injectBridge();
    const w = iframe.contentWindow;
    if (!w || !w._b3d) return null;
    const st = w._b3d();
    if (!st || !st.ok) return null;
    return st;
  } catch (e) { return null; }
}

// ══════════════════════════════
// ── 디버그 키 (F10/F9/Shift+R)
// iframe 내부 capture-phase에서 가로채고 postMessage로 부모에 전파
// ══════════════════════════════
let testModeActive = false;
let godModeActive = false;
let profilingActive = false;

// iframe에서 올라오는 메시지 수신
window.addEventListener('message', (ev) => {
  if (!ev.data || !ev.data.type) return;
  if (ev.data.type === 'b3d_boss') {
    const { action, result } = ev.data;
    if (action === 'enter') {
      log('F10 보스전 진입:', result);
      if (result === 'OK') testModeActive = true;
    } else {
      log('F10 복귀:', result);
      if (result === 'OK') testModeActive = false;
    }
  } else if (ev.data.type === 'b3d_god') {
    godModeActive = ev.data.active;
    log('F9 무적:', godModeActive ? 'ON' : 'OFF');
  } else if (ev.data.type === 'b3d_prof') {
    profilingActive = ev.data.active;
    log('F8 프로파일:', profilingActive ? 'ON (30초)' : 'OFF + CSV 저장');
  } else if (ev.data.type === 'b3d_reset') {
    testModeActive = false;
    godModeActive = false;
    profilingActive = false;
    log('리셋 OK');
  }
});

// 부모 윈도우 키 핸들러 (iframe 비포커스 시 폴백)
window.addEventListener('keydown', (e) => {
  if (e.key === 'F10') {
    e.preventDefault(); e.stopPropagation();
    try {
      const w = iframe.contentWindow;
      if (!w || !w._b3d_enterBoss) return;
      if (!testModeActive) {
        const r = w._b3d_enterBoss();
        if (r === 'OK') testModeActive = true;
        log('F10 보스전 진입:', r);
      } else {
        const r = w._b3d_exitBoss();
        if (r === 'OK') testModeActive = false;
        log('F10 복귀:', r);
      }
    } catch (e2) {}
    return;
  }
  if (e.key === 'F9') {
    e.preventDefault(); e.stopPropagation();
    godModeActive = !godModeActive;
    try { iframe.contentWindow._b3d_godMode = godModeActive; } catch(e2) {}
    log('F9 무적:', godModeActive ? 'ON' : 'OFF');
    return;
  }
  if (e.key === 'F8') {
    e.preventDefault(); e.stopPropagation();
    try {
      const w = iframe.contentWindow;
      w._b3d_profiling = !w._b3d_profiling;
      if (w._b3d_profiling) { w._b3d_profFrames = []; w._b3d_profStart = performance.now(); }
      else { w._b3d_profEnd(); }
      profilingActive = w._b3d_profiling;
      log('F8 프로파일:', profilingActive ? 'ON (30초)' : 'OFF + CSV');
    } catch(e2) {}
    return;
  }
  if ((e.key === 'r' || e.key === 'R') && e.shiftKey) {
    e.preventDefault(); e.stopPropagation();
    try { iframe.contentWindow._b3d_reset(); } catch(e2) {}
    testModeActive = false; godModeActive = false;
    log('리셋 OK');
    return;
  }
  iframe.contentWindow.focus();
}, true);

// ══════════════════════════════
// ── 3D 보스 피격 flash
// ══════════════════════════════
let flashTimer = 0;
const FLASH_DUR = 0.12; // 120ms

function applyFlash(isFlashing) {
  for (let i = 0; i < bossMeshes.length; i++) {
    bossMeshes[i].material = isFlashing ? flashMat : bossOrigMats[i];
  }
}

// ══════════════════════════════
// ── FPS + HUD
// ══════════════════════════════
let frames = 0, fpsTime = 0, curFps = 0;
const logLines = [];
function log(...args) { logLines.push(args.join(' ')); if (logLines.length > 10) logLines.shift(); }

function updateHud(state) {
  const L = [];
  const tags = [testModeActive ? '★TEST' : '', godModeActive ? '★GOD' : '', profilingActive ? '★PROF' : ''].filter(Boolean).join(' ');
  L.push(`[Boss 3D Overlay] ${tags}`);
  L.push(`Three.js: OK | GLB: ${bossReady ? 'OK' : '...'}`);
  if (state) {
    L.push(`Game: ${state.gameOn?'ON':'OFF'} | Stage: ${state.stage} | Arena: ${state._bossArena}`);
    if (state.bossVisible) {
      const dx = state.bossX - state.playerX, dy = state.bossY - state.playerY;
      L.push(`Boss HP: ${state.bossHP}/${state.bossMHP} (${(state.bossHP/state.bossMHP*100).toFixed(1)}%)`);
      L.push(`Boss: st=${state.bossState} dist=${Math.sqrt(dx*dx+dy*dy).toFixed(0)} R=${state.bossR}`);
      L.push(`Boss 2D hidden: ${testModeActive} | 3D vis: ${bossPivot?.visible}`);
      if (state.bossStunned) L.push(`★ STUNNED (그로기)`);
    } else if (state.bossDead) {
      L.push(`Boss: ☠ DEAD`);
    } else {
      L.push(`Boss: not spawned`);
    }
    L.push(`Player HP: ${state.playerHP}/${state.playerMHP}`);
    L.push(`3D FPS: ${curFps} | Game FPS: ${state.gameFps||'?'}`);
  } else {
    L.push(`Game: 접속 대기... | 3D FPS: ${curFps}`);
  }
  if (logLines.length) { L.push('---'); logLines.forEach(l => L.push(l)); }
  hud.textContent = L.join('\n');
}

// ══════════════════════════════
// ── 보스 3D 위치 동기 + 렌더
// ══════════════════════════════
let prevBossHitT = 0;

function syncBoss(state, dt) {
  if (!bossPivot || !bossReady) return;

  // 보스 사망 → 3D 숨김
  if (!state || !state.gameOn || state.bossDead || !state.bossVisible) {
    bossPivot.visible = false;
    applyFlash(false);
    return;
  }

  // 테스트 모드 아니면 3D 안 보여줌
  if (!testModeActive) {
    bossPivot.visible = false;
    return;
  }

  // ── 좌표 변환 ──
  const physX = state.canvasW / 2 + (state.bossX - state.camX);
  const physY = state.canvasH / 2 + (state.bossY - state.camY);

  const scale = (state.dpr || 1) * (state.resScale || 1);
  const cssX = physX / scale;
  const cssY = physY / scale;

  const W = window.innerWidth, H = window.innerHeight;
  const margin = 200;
  if (cssX < -margin || cssX > W + margin || cssY < -margin || cssY > H + margin) {
    bossPivot.visible = false;
    return;
  }

  // CSS 픽셀 → Three.js 월드 좌표 (1유닛 = 1 CSS px)
  const worldX = cssX - W / 2;
  const worldY = -(cssY - H / 2);

  bossPivot.position.x = worldX;
  bossPivot.position.y = worldY - 100;
  bossPivot.position.z = 0;

  // 스케일 (pivot 단위로 설정)
  const bossRcss = state.bossR / scale;
  const tgtH = bossRcss * 2.0; // 3D 크기를 2D 프레임에 맞춤 (3.0→2.0)
  if (bossSize.y > 0) {
    bossPivot.scale.setScalar(Math.max(0.1, tgtH / bossSize.y));
  }

  // facing → Y축 풀회전 (캐릭터를 바라보게)
  // 게임 facing: 보스→플레이어 각도 (0=오른쪽, PI/2=아래)
  // Three.js Y회전: 모델 앞면(+Z)을 facing 방향으로
  bossPivot.rotation.set(0, state.bossFacing + Math.PI, 0);

  // 디버그 콘솔 (초당 1회)
  if (!syncBoss._dbgT) syncBoss._dbgT = 0;
  syncBoss._dbgT += dt;
  if (syncBoss._dbgT > 1) {
    syncBoss._dbgT = 0;
    console.log(`[B3D-SYNC] phys(${physX.toFixed(0)},${physY.toFixed(0)}) css(${cssX.toFixed(0)},${cssY.toFixed(0)}) world(${worldX.toFixed(0)},${worldY.toFixed(0)}) final.y=${bossPivot.position.y.toFixed(0)} cam:[L${cam.left.toFixed(0)} R${cam.right.toFixed(0)} T${cam.top.toFixed(0)} B${cam.bottom.toFixed(0)}]`);
  }

  bossPivot.visible = true;

  // ── 피격 flash ──
  if (state.bossHitT > prevBossHitT) {
    flashTimer = FLASH_DUR;
    prevBossHitT = state.bossHitT;
  }
  if (flashTimer > 0) {
    flashTimer -= dt;
    applyFlash(true);
  } else {
    applyFlash(false);
  }

  // 그로기 시 살짝 흔들림 (CSS px 단위)
  if (state.bossStunned) {
    bossPivot.position.x += Math.sin(performance.now() * 0.03) * 2;
    bossPivot.position.y += Math.cos(performance.now() * 0.04) * 2;
  }
}

// ══════════════════════════════
// ── 메인 렌더 루프
// ══════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  frames++;
  fpsTime += dt;
  if (fpsTime >= 1) { curFps = frames; frames = 0; fpsTime = 0; }

  if (bossMixer) bossMixer.update(dt);

  const state = getGameState();

  // F9 무적: iframe 내부 _b3d_godMode 기반으로 매 프레임 회복
  if (godModeActive && state && state.gameOn) {
    try {
      const w = iframe.contentWindow;
      if (!w._b3d_godTick) {
        const gs = w.document.createElement('script');
        gs.textContent = `window._b3d_godTick = () => { if(typeof P!=='undefined'&&P){P.hp=P.mhp;P.st=P.mst;P.mp=P.mmp;P.iframes=9999;P.shield=P.mshield} };`;
        w.document.body.appendChild(gs);
      }
      if (w._b3d_godTick) w._b3d_godTick();
    } catch (e) {}
  }

  syncBoss(state, dt);
  updateHud(state);

  renderer.render(scene, cam);
}

animate();
log('Three.js 초기화 완료');
log('F10=보스전, F9=무적, F8=프로파일, Shift+R=리셋');

// ── iframe 포커스 ──
iframe.addEventListener('load', () => {
  iframe.contentWindow.focus();
  log('game.html 로드 완료');
});
window.addEventListener('click', () => iframe.contentWindow.focus());
</script>
</body>
</html>
