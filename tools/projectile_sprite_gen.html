<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>투사체 3D 프리렌더 스프라이트시트 생성기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;min-height:100vh}
h1{text-align:center;padding:16px;background:#16213e;border-bottom:2px solid #0f3460;font-size:1.4em;letter-spacing:2px}
h1 span{color:#e94560}
.main{display:flex;flex:1;gap:12px;padding:12px}
.panel{background:#16213e;border-radius:8px;padding:12px;border:1px solid #0f3460}
.left{width:320px;display:flex;flex-direction:column;gap:12px}
.right{flex:1;display:flex;flex-direction:column;gap:12px}
label{font-size:0.85em;color:#aaa;margin-bottom:4px;display:block}
.section-title{font-size:0.9em;font-weight:bold;color:#e94560;margin-bottom:8px;border-bottom:1px solid #0f3460;padding-bottom:4px}

/* Element buttons */
.el-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.el-btn{border:2px solid transparent;border-radius:6px;padding:6px 4px;cursor:pointer;text-align:center;font-size:0.8em;font-weight:bold;background:#0d1b2a;transition:all .15s}
.el-btn:hover{transform:scale(1.05)}
.el-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.3)}

/* Type buttons */
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.type-btn{border:2px solid #0f3460;border-radius:6px;padding:8px 4px;cursor:pointer;text-align:center;font-size:0.78em;background:#0d1b2a;color:#ccc;transition:all .15s}
.type-btn:hover{border-color:#e94560}
.type-btn.active{border-color:#e94560;background:#1a0a1e;color:#fff}
.type-btn .tname{font-weight:bold;font-size:1.1em}
.type-btn .tinfo{color:#888;font-size:0.85em}

/* Preview */
.preview-wrap{position:relative;background:#0d0d1a;border-radius:8px;border:1px solid #0f3460;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:200px}
.preview-wrap canvas{image-rendering:pixelated}
.preview-label{position:absolute;top:6px;left:8px;font-size:0.7em;color:#666}

/* Spritesheet preview */
.sheet-preview{background:#0d0d1a;border-radius:8px;border:1px solid #0f3460;padding:12px;min-height:80px;display:flex;align-items:center;gap:2px;flex-wrap:wrap;overflow-x:auto}
.sheet-preview canvas{image-rendering:pixelated;border:1px solid #333}

/* Controls */
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input[type=range]{flex:1;accent-color:#e94560}
.slider-row .val{min-width:36px;text-align:right;font-size:0.85em;color:#e94560}

/* Buttons */
.btn{border:none;border-radius:6px;padding:10px 16px;cursor:pointer;font-weight:bold;font-size:0.9em;transition:all .15s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:#e94560;color:#fff}
.btn-primary:hover{background:#ff6b81}
.btn-secondary{background:#0f3460;color:#ccc}
.btn-secondary:hover{background:#1a4a7a}
.btn-row{display:flex;gap:8px}

/* Status */
.status{font-size:0.8em;color:#666;text-align:center;padding:4px}
.status.busy{color:#e94560}

/* Info */
.info-box{font-size:0.75em;color:#888;line-height:1.5;padding:8px;background:#0d1b2a;border-radius:6px}
</style>
</head>
<body>

<h1>투사체 <span>3D</span> 프리렌더 스프라이트시트 생성기</h1>

<div class="main">
  <div class="left">
    <!-- Element Selection -->
    <div class="panel">
      <div class="section-title">원소 선택</div>
      <div class="el-grid" id="elGrid"></div>
    </div>

    <!-- Type Selection -->
    <div class="panel">
      <div class="section-title">투사체 타입</div>
      <div class="type-grid" id="typeGrid"></div>
    </div>

    <!-- Scale -->
    <div class="panel">
      <div class="section-title">크기 배율</div>
      <div class="slider-row">
        <input type="range" id="scaleSlider" min="0.5" max="2" step="0.1" value="1">
        <span class="val" id="scaleVal">1.0x</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="panel">
      <div class="section-title">다운로드</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnDownload" onclick="downloadCurrent()">현재 다운로드</button>
        <button class="btn btn-secondary" id="btnDownloadAll" onclick="downloadAll()">전체 다운로드</button>
      </div>
      <div class="status" id="status">준비됨</div>
    </div>

    <!-- Info -->
    <div class="info-box">
      Dead Cells 방식: 3D 모델 → 저해상도 프리렌더 → PNG 스프라이트시트<br>
      콩 투사체(bean)는 원소 없이 고정 색상
    </div>
  </div>

  <div class="right">
    <!-- 3D Preview -->
    <div class="panel" style="flex:2">
      <div class="section-title">3D 미리보기 (실시간 회전)</div>
      <div class="preview-wrap" id="previewWrap">
        <div class="preview-label" id="previewLabel">arrow / phys</div>
      </div>
    </div>

    <!-- Spritesheet Preview -->
    <div class="panel" style="flex:1">
      <div class="section-title">스프라이트시트 프리뷰</div>
      <div class="sheet-preview" id="sheetPreview"></div>
      <div style="text-align:center;margin-top:6px">
        <canvas id="sheetCanvas" style="image-rendering:pixelated;border:1px solid #333;display:none"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== DATA ==========

const ELEMENTS = [
  { id:'phys', name:'물리', color:'#aaaaaa', emissive:0xaaaaaa, mat:0x888888 },
  { id:'fire', name:'화염', color:'#ff4422', emissive:0xff4400, mat:0xcc3300 },
  { id:'ice',  name:'빙결', color:'#3388ff', emissive:0x2266ff, mat:0x1155cc },
  { id:'dark', name:'암흑', color:'#8833cc', emissive:0x8822bb, mat:0x551188 },
  { id:'ltn',  name:'뇌전', color:'#ffee00', emissive:0xffdd00, mat:0xccaa00 },
  { id:'holy', name:'신성', color:'#ffd700', emissive:0xffcc00, mat:0xddaa00 },
];

const PROJ_TYPES = [
  { id:'arrow',     name:'화살',       frames:1, cellW:32, cellH:16, hasElement:true },
  { id:'orb',       name:'매직 오브',  frames:8, cellW:32, cellH:32, hasElement:true },
  { id:'bomb',      name:'폭탄',       frames:4, cellW:40, cellH:40, hasElement:true },
  { id:'shard',     name:'빙결 샤드',  frames:8, cellW:28, cellH:28, hasElement:true },
  { id:'bolt',      name:'뇌전 볼트',  frames:4, cellW:32, cellH:24, hasElement:true },
  { id:'redbean',   name:'빨간콩',     frames:4, cellW:24, cellH:16, hasElement:false },
  { id:'blackbean', name:'검은콩',     frames:4, cellW:24, cellH:16, hasElement:false },
  { id:'bluebean',  name:'파란콩',     frames:4, cellW:28, cellH:18, hasElement:false },
];

let curElement = ELEMENTS[0];
let curType = PROJ_TYPES[0];
let curScale = 1.0;

// Three.js globals
let previewRenderer, previewScene, previewCamera, previewGroup;
let previewAnimId = 0;
let previewFrame = 0;

// ========== UI INIT ==========

function initUI() {
  // Element buttons
  const elGrid = document.getElementById('elGrid');
  ELEMENTS.forEach((el, i) => {
    const btn = document.createElement('div');
    btn.className = 'el-btn' + (i === 0 ? ' active' : '');
    btn.style.color = el.color;
    btn.style.borderColor = i === 0 ? '#fff' : 'transparent';
    btn.innerHTML = `<div style="width:16px;height:16px;border-radius:50%;background:${el.color};margin:0 auto 3px;box-shadow:0 0 6px ${el.color}"></div>${el.name}`;
    btn.onclick = () => {
      curElement = el;
      elGrid.querySelectorAll('.el-btn').forEach(b => { b.classList.remove('active'); b.style.borderColor = 'transparent'; });
      btn.classList.add('active');
      btn.style.borderColor = '#fff';
      rebuildPreview();
    };
    elGrid.appendChild(btn);
  });

  // Type buttons
  const typeGrid = document.getElementById('typeGrid');
  PROJ_TYPES.forEach((t, i) => {
    const btn = document.createElement('div');
    btn.className = 'type-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<div class="tname">${t.name}</div><div class="tinfo">${t.cellW}×${t.cellH} · ${t.frames}fr</div>`;
    btn.onclick = () => {
      curType = t;
      typeGrid.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      rebuildPreview();
    };
    typeGrid.appendChild(btn);
  });

  // Scale slider
  const slider = document.getElementById('scaleSlider');
  const valEl = document.getElementById('scaleVal');
  slider.oninput = () => {
    curScale = parseFloat(slider.value);
    valEl.textContent = curScale.toFixed(1) + 'x';
    rebuildPreview();
  };
}

// ========== THREE.JS SCENE BUILDERS ==========

function buildScene(type, el, frameIndex) {
  const scene = new THREE.Scene();

  // Lighting
  scene.add(new THREE.AmbientLight(0x222222, 0.4));
  const pLight = new THREE.PointLight(el.emissive, 2.8, 8);
  pLight.position.set(1.5, 1.5, 3);
  scene.add(pLight);
  const fLight = new THREE.PointLight(0xffffff, 0.2, 8);
  fLight.position.set(-2, -1, 2);
  scene.add(fLight);

  const group = new THREE.Group();

  switch (type.id) {
    case 'arrow': buildArrow(group, el); break;
    case 'orb': buildOrb(group, el, frameIndex, type.frames); break;
    case 'bomb': buildBomb(group, el, frameIndex, type.frames); break;
    case 'shard': buildShard(group, el, frameIndex, type.frames); break;
    case 'bolt': buildBolt(group, el, frameIndex); break;
    case 'redbean': buildBean(group, {body:0xcc2200, emissive:0xff2200, aura:0xff4400, core:0xffaa44}, frameIndex); break;
    case 'blackbean': buildBean(group, {body:0x222222, emissive:0x440066, aura:0x8800cc, core:0xaa44ff}, frameIndex); break;
    case 'bluebean': buildBean(group, {body:0x006688, emissive:0x00aacc, aura:0x00bcd4, core:0x88eeff}, frameIndex); break;
  }

  scene.add(group);
  return { scene, group };
}

function buildArrow(g, el) {
  // Tip
  const tip = new THREE.Mesh(
    new THREE.ConeGeometry(0.2, 0.8, 8),
    new THREE.MeshStandardMaterial({ color: el.mat, emissive: el.emissive, emissiveIntensity: 1.5, metalness: 0.7, roughness: 0.2 })
  );
  tip.rotation.z = -Math.PI / 2;
  tip.position.x = 0.6;
  g.add(tip);

  // Shaft
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, 1.2, 6),
    new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.3, roughness: 0.6 })
  );
  shaft.rotation.z = Math.PI / 2;
  g.add(shaft);

  // Fletching
  const fletch = new THREE.Mesh(
    new THREE.ConeGeometry(0.12, 0.4, 4),
    new THREE.MeshStandardMaterial({ color: el.mat, emissive: el.emissive, emissiveIntensity: 0.8 })
  );
  fletch.rotation.z = Math.PI / 2;
  fletch.position.x = -0.7;
  g.add(fletch);

  // Glow trail
  const trail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.02, 1.0, 6),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.2, transparent: true })
  );
  trail.rotation.z = Math.PI / 2;
  trail.position.x = -0.3;
  g.add(trail);

  const light = new THREE.PointLight(el.emissive, 2.0, 5);
  g.add(light);
}

function buildOrb(g, el, frame, totalFrames) {
  // Core sphere
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 16, 16),
    new THREE.MeshStandardMaterial({ color: el.mat, emissive: el.emissive, emissiveIntensity: 3.0, metalness: 0.2, roughness: 0.15, opacity: 0.92, transparent: true })
  );
  g.add(core);

  // Glow shell
  const shell = new THREE.Mesh(
    new THREE.SphereGeometry(0.9, 12, 12),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.12, transparent: true, side: THREE.BackSide })
  );
  g.add(shell);

  // Outer glow
  const outer = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 8, 8),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.06, transparent: true, side: THREE.BackSide })
  );
  g.add(outer);

  // Swirl ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.75, 0.04, 8, 24),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.5, transparent: true })
  );
  const ang = (frame / totalFrames) * Math.PI * 2;
  ring.rotation.x = ang;
  ring.rotation.z = ang * 0.7;
  g.add(ring);

  // Rotate whole group for frame
  g.rotation.y = (frame / totalFrames) * Math.PI * 2;

  const light = new THREE.PointLight(el.emissive, 2.5, 6);
  g.add(light);
}

function buildBomb(g, el, frame, totalFrames) {
  // Body
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0x2a2a2a, emissive: el.emissive, emissiveIntensity: 1.2, metalness: 0.8, roughness: 0.3 })
  );
  g.add(body);

  // Crack wireframe
  const crack = new THREE.Mesh(
    new THREE.SphereGeometry(0.62, 6, 6),
    new THREE.MeshBasicMaterial({ color: el.emissive, wireframe: true, opacity: 0.5, transparent: true })
  );
  g.add(crack);

  // Inner core
  const inner = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 8, 8),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.6, transparent: true })
  );
  g.add(inner);

  // Fuse
  const fuse = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4),
    new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.8 })
  );
  fuse.position.y = 0.65;
  g.add(fuse);

  // Spark
  const sparkSize = 0.06 + Math.sin(frame * 1.8) * 0.03;
  const spark = new THREE.Mesh(
    new THREE.SphereGeometry(sparkSize, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffffaa })
  );
  spark.position.y = 0.8 + Math.sin(frame * 2.1) * 0.05;
  spark.position.x = Math.cos(frame * 1.5) * 0.03;
  g.add(spark);

  // Subtle rotation per frame
  g.rotation.y = (frame / totalFrames) * Math.PI * 0.5;
  g.rotation.z = Math.sin(frame * 0.8) * 0.05;

  const light = new THREE.PointLight(el.emissive, 1.5, 5);
  g.add(light);
}

function buildShard(g, el, frame, totalFrames) {
  // Main crystal
  const crystal = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.5),
    new THREE.MeshStandardMaterial({ color: el.mat, emissive: el.emissive, emissiveIntensity: 2.0, metalness: 0.5, roughness: 0.1, opacity: 0.85, transparent: true })
  );
  crystal.scale.set(1, 1.5, 0.6);
  g.add(crystal);

  // Inner core
  const inner = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.3),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.7, transparent: true })
  );
  inner.scale.set(1, 1.5, 0.6);
  g.add(inner);

  // 3 fragment shards orbiting
  for (let i = 0; i < 3; i++) {
    const frag = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.12),
      new THREE.MeshStandardMaterial({ color: el.mat, emissive: el.emissive, emissiveIntensity: 2.0, metalness: 0.5, roughness: 0.1, opacity: 0.5, transparent: true })
    );
    const baseAng = (i / 3) * Math.PI * 2;
    const orbitAng = baseAng + (frame / totalFrames) * Math.PI * 2;
    frag.position.x = Math.cos(orbitAng) * 0.7;
    frag.position.z = Math.sin(orbitAng) * 0.7;
    frag.position.y = Math.sin(orbitAng * 2) * 0.15;
    g.add(frag);
  }

  g.rotation.y = (frame / totalFrames) * Math.PI * 2;

  const light = new THREE.PointLight(el.emissive, 2.0, 5);
  g.add(light);
}

function buildBolt(g, el, frame) {
  // Core
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: el.emissive, emissiveIntensity: 3.0, metalness: 0.1, roughness: 0.1 })
  );
  g.add(core);

  // Zigzag lightning segments
  const segCount = 5 + Math.floor(Math.random() * 3);
  // Use frame as seed for deterministic randomness
  const seed = frame * 12345;
  const pseudoRand = (i) => {
    const x = Math.sin(seed + i * 9876.54321) * 43758.5453;
    return x - Math.floor(x);
  };

  for (let dir = 0; dir < 3; dir++) {
    const pts = [];
    const baseAng = (dir / 3) * Math.PI * 2 + frame * 0.3;
    let px = 0, py = 0;
    pts.push(new THREE.Vector3(0, 0, 0));
    for (let s = 0; s < segCount; s++) {
      const dist = 0.2;
      px += Math.cos(baseAng) * dist;
      py += Math.sin(baseAng) * dist + (pseudoRand(s + dir * 10) - 0.5) * 0.4;
      pts.push(new THREE.Vector3(px, py, (pseudoRand(s + dir * 20) - 0.5) * 0.2));
    }

    for (let s = 0; s < pts.length - 1; s++) {
      const start = pts[s], end = pts[s + 1];
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const len = start.distanceTo(end);
      const seg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, len, 4),
        new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.8, transparent: true })
      );
      seg.position.copy(mid);
      seg.lookAt(end);
      seg.rotateX(Math.PI / 2);
      g.add(seg);
    }
  }

  // Outer glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 8, 8),
    new THREE.MeshBasicMaterial({ color: el.emissive, opacity: 0.1, transparent: true, side: THREE.BackSide })
  );
  g.add(glow);

  const light = new THREE.PointLight(el.emissive, 2.5, 6);
  g.add(light);
}

function buildBean(g, colors, frame) {
  // Body (ellipsoid)
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 10, 10),
    new THREE.MeshStandardMaterial({ color: colors.body, emissive: colors.emissive, emissiveIntensity: 2.0, metalness: 0.2, roughness: 0.3 })
  );
  body.scale.set(1.6, 1.0, 0.8);
  g.add(body);

  // Aura
  const aura = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 8, 8),
    new THREE.MeshBasicMaterial({ color: colors.aura, opacity: 0.15, transparent: true, side: THREE.BackSide })
  );
  aura.scale.set(1.4, 1.0, 0.8);
  g.add(aura);

  // Core (pulsing)
  const coreScale = 0.9 + Math.sin(frame * Math.PI / 2) * 0.1;
  const coreGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const coreMesh = new THREE.Mesh(
    coreGeo,
    new THREE.MeshBasicMaterial({ color: colors.core })
  );
  coreMesh.scale.set(coreScale, coreScale, coreScale);
  g.add(coreMesh);

  const light = new THREE.PointLight(colors.emissive, 1.5, 4);
  g.add(light);
}

// ========== RENDER ENGINE ==========

function createRenderer(w, h) {
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false, preserveDrawingBuffer: true });
  renderer.setSize(w, h);
  renderer.setClearColor(0x000000, 0);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.3;
  return renderer;
}

function createCamera(type, scale) {
  const w = type.cellW * scale;
  const h = type.cellH * scale;
  const aspect = w / h;
  // 타입별 frustum 조정: 작은 모델은 카메라를 더 가깝게
  const frustumMap = {arrow:1.0, redbean:0.9, blackbean:0.9, bluebean:0.9, bolt:1.2};
  const frustum = frustumMap[type.id] || 1.8;
  const camera = new THREE.OrthographicCamera(
    -frustum * aspect, frustum * aspect,
    frustum, -frustum,
    0.1, 100
  );
  camera.position.set(0, 0, 5);
  camera.lookAt(0, 0, 0);
  return camera;
}

function renderFrame(type, el, frameIndex, scale) {
  const w = Math.round(type.cellW * scale);
  const h = Math.round(type.cellH * scale);
  const renderer = createRenderer(w, h);
  const camera = createCamera(type, scale);
  const { scene } = buildScene(type, el, frameIndex);
  renderer.render(scene, camera);
  const canvas = renderer.domElement;
  renderer.dispose();
  return canvas;
}

function renderSpriteSheet(type, el, scale) {
  const w = Math.round(type.cellW * scale);
  const h = Math.round(type.cellH * scale);
  const totalW = w * type.frames;

  const sheetCanvas = document.createElement('canvas');
  sheetCanvas.width = totalW;
  sheetCanvas.height = h;
  const ctx = sheetCanvas.getContext('2d');

  for (let f = 0; f < type.frames; f++) {
    const frameCanvas = renderFrame(type, el, f, scale);
    ctx.drawImage(frameCanvas, f * w, 0, w, h);
  }

  return sheetCanvas;
}

// ========== PREVIEW ==========

function rebuildPreview() {
  const el = curType.hasElement ? curElement : ELEMENTS[0]; // beans don't use elements
  const label = curType.hasElement ? `${curType.name} / ${curElement.name}` : curType.name;
  document.getElementById('previewLabel').textContent = label;

  // Stop old animation
  if (previewAnimId) cancelAnimationFrame(previewAnimId);

  const wrap = document.getElementById('previewWrap');
  // Remove old canvas
  const oldCanvas = wrap.querySelector('canvas');
  if (oldCanvas) wrap.removeChild(oldCanvas);

  // Create preview renderer (bigger for visibility)
  const previewScale = 4;
  const pw = Math.round(curType.cellW * previewScale);
  const ph = Math.round(curType.cellH * previewScale);

  previewRenderer = createRenderer(pw, ph);
  previewRenderer.domElement.style.imageRendering = 'pixelated';
  wrap.appendChild(previewRenderer.domElement);

  previewCamera = createCamera(curType, previewScale);
  previewFrame = 0;

  let lastTime = 0;
  const frameDelay = 120; // ms between frames

  function animate(time) {
    previewAnimId = requestAnimationFrame(animate);
    if (time - lastTime > frameDelay) {
      lastTime = time;
      const { scene, group } = buildScene(curType, el, previewFrame);
      // Gentle rotation for preview
      group.rotation.y += 0.3;
      previewRenderer.render(scene, previewCamera);
      previewFrame = (previewFrame + 1) % curType.frames;
    }
  }
  animate(0);

  // Update spritesheet preview
  updateSheetPreview();
}

function updateSheetPreview() {
  const el = curType.hasElement ? curElement : ELEMENTS[0];
  const container = document.getElementById('sheetPreview');
  container.innerHTML = '';

  const displayScale = 2; // Show at 2x for visibility
  for (let f = 0; f < curType.frames; f++) {
    const frameCanvas = renderFrame(curType, el, f, curScale);
    // Scale up for display
    const displayCanvas = document.createElement('canvas');
    displayCanvas.width = frameCanvas.width * displayScale;
    displayCanvas.height = frameCanvas.height * displayScale;
    displayCanvas.style.width = displayCanvas.width + 'px';
    displayCanvas.style.height = displayCanvas.height + 'px';
    const dCtx = displayCanvas.getContext('2d');
    dCtx.imageSmoothingEnabled = false;
    dCtx.drawImage(frameCanvas, 0, 0, displayCanvas.width, displayCanvas.height);
    container.appendChild(displayCanvas);
  }

  // Also update the combined sheet canvas
  const sheetCanvas = renderSpriteSheet(curType, el, curScale);
  const sc = document.getElementById('sheetCanvas');
  sc.width = sheetCanvas.width * displayScale;
  sc.height = sheetCanvas.height * displayScale;
  sc.style.width = sc.width + 'px';
  sc.style.height = sc.height + 'px';
  sc.style.display = 'block';
  const sCtx = sc.getContext('2d');
  sCtx.imageSmoothingEnabled = false;
  sCtx.drawImage(sheetCanvas, 0, 0, sc.width, sc.height);
}

// ========== DOWNLOAD ==========

function getFilename(type, el) {
  if (type.hasElement) return `proj_${type.id}_${el.id}.png`;
  return `proj_${type.id}.png`;
}

function downloadCurrent() {
  const el = curType.hasElement ? curElement : ELEMENTS[0];
  const sheet = renderSpriteSheet(curType, el, curScale);
  downloadCanvas(sheet, getFilename(curType, el));
}

function downloadCanvas(canvas, filename) {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

async function downloadAll() {
  const status = document.getElementById('status');
  const btn = document.getElementById('btnDownloadAll');
  btn.disabled = true;
  status.className = 'status busy';

  let count = 0;
  const total = PROJ_TYPES.reduce((acc, t) => acc + (t.hasElement ? ELEMENTS.length : 1), 0);

  for (const type of PROJ_TYPES) {
    if (type.hasElement) {
      for (const el of ELEMENTS) {
        status.textContent = `생성 중... ${++count}/${total} (${type.name} - ${el.name})`;
        const sheet = renderSpriteSheet(type, el, curScale);
        downloadCanvas(sheet, getFilename(type, el));
        await new Promise(r => setTimeout(r, 200)); // Delay to avoid browser blocking
      }
    } else {
      status.textContent = `생성 중... ${++count}/${total} (${type.name})`;
      const sheet = renderSpriteSheet(type, ELEMENTS[0], curScale);
      downloadCanvas(sheet, getFilename(type, ELEMENTS[0]));
      await new Promise(r => setTimeout(r, 200));
    }
  }

  status.textContent = `완료! ${total}개 파일 다운로드됨`;
  status.className = 'status';
  btn.disabled = false;
}

// ========== INIT ==========
initUI();
rebuildPreview();
</script>
