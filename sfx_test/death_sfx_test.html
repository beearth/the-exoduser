<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Death SFX Test</title>
<style>
body{margin:0;background:#111;color:#eee;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
button{padding:14px 28px;font-size:16px;font-family:monospace;border:2px solid #555;border-radius:6px;cursor:pointer;min-width:200px;transition:all .15s}
button:hover{transform:scale(1.05)}
button:active{transform:scale(.95)}
.insect{background:#2a3a10;color:#8c2;border-color:#6a4}
.ghost{background:#1a1a2e;color:#88aaff;border-color:#6688cc}
.armor{background:#2a2a2a;color:#ccc;border-color:#888}
.ghoul{background:#2a1515;color:#c88;border-color:#864}
h2{margin:0;color:#888}
.group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.tag{font-size:11px;color:#666;margin-top:4px}
</style>
</head><body>
<h2>Death SFX Test (AI Generated MP3)</h2>
<div class="group">
<button class="insect" onclick="play('insect')">Insect Death<br><small>갑각 파열+체액</small></button>
<button class="ghost" onclick="play('ghost')">Ghost Death<br><small>울부짖음+소멸</small></button>
<button class="armor" onclick="play('armor')">Armor Death<br><small>금속 충돌+낙하</small></button>
<button class="ghoul" onclick="play('ghoul1')">Ghoul 1 (소)<br><small>소형 구울</small></button>
<button class="ghoul" onclick="play('ghoul2')">Ghoul 2 (중)<br><small>중형 구울</small></button>
<button class="ghoul" onclick="play('ghoul3')">Ghoul 3 (대)<br><small>대형 구울</small></button>
</div>
<div class="tag">sfx/death/*.mp3</div>
<script>
const files={
  insect:'../sfx/death/death_insect.mp3',
  ghost:'../sfx/death/death_ghost.mp3',
  armor:'../sfx/death/death_armor.mp3',
  ghoul1:'../sfx/death/death_ghoul1.mp3',
  ghoul2:'../sfx/death/death_ghoul2.mp3',
  ghoul3:'../sfx/death/death_ghoul3.mp3'
};
function play(key){
  const a=new Audio(files[key]);
  a.volume=0.7;
  a.play();
}
</script>
</body></html>
